
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #EEF2F7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }

  .app { width: 100%; max-width: 560px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .header h1 { font-size: 17px; font-weight: 800; color: #1A202C; letter-spacing: -0.3px; }
  .counter { font-size: 13px; color: #718096; font-weight: 600; }

  /* Progress */
  .progress-bar { height: 5px; background: #E2E8F0; border-radius: 3px; margin-bottom: 14px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4F46E5, #7C3AED); transition: width 0.4s ease; }

  /* Topic chips */
  .topics { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .chip {
    padding: 4px 11px; border-radius: 20px; border: none; cursor: pointer;
    font-size: 11.5px; font-weight: 600; transition: all 0.15s; line-height: 1.4;
  }
  .chip-inactive { background: #E2E8F0; color: #4A5568; }
  .chip-inactive:hover { background: #CBD5E0; }
  .chip-active { background: #1A202C; color: white; }

  /* Card container */
  .card-area { position: relative; margin-bottom: 12px; cursor: pointer; }

  /* The card itself */
  .card {
    background: white;
    border-radius: 18px;
    padding: 26px 24px 22px;
    min-height: 250px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.09), 0 1px 3px rgba(0,0,0,0.06);
    border-left: 5px solid #4F46E5;
    display: flex;
    flex-direction: column;
    transition: background 0.25s, border-color 0.25s;
    user-select: none;
    -webkit-user-select: none;
  }
  .card.flipped { background: #F7F6FF; }

  /* Card top row */
  .card-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .type-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .flip-hint { font-size: 11px; color: #A0AEC0; }

  /* Card body */
  .card-body {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
  }
  .question {
    font-size: 17px; font-weight: 700; color: #1A202C;
    text-align: center; line-height: 1.65; white-space: pre-line;
  }
  .answer {
    font-size: 15px; font-weight: 400; color: #2D3748;
    text-align: left; line-height: 1.85; white-space: pre-line;
    width: 100%;
  }

  /* Hint */
  .hint { margin-top: 16px; font-size: 12px; color: #A0AEC0; text-align: center; }
  .hint strong { color: #7C3AED; }

  /* Topic label on back */
  .topic-label { margin-top: 14px; font-size: 11px; color: #A0AEC0; text-align: center; font-weight: 600; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; }
  .btn {
    border: none; border-radius: 12px; cursor: pointer;
    font-size: 14px; font-weight: 700; padding: 13px 16px;
    transition: all 0.15s; flex: 1;
    font-family: inherit;
  }
  .btn-nav { flex: 0; background: #E2E8F0; color: #4A5568; padding: 13px 18px; font-size: 16px; }
  .btn-nav:hover { background: #CBD5E0; }
  .btn-flip { background: #1A202C; color: white; }
  .btn-flip:hover { background: #2D3748; transform: translateY(-1px); }
  .btn-know { background: #C6F6D5; color: #22543D; }
  .btn-know:hover { background: #9AE6B4; }
  .btn-review { background: #FEFCBF; color: #744210; }
  .btn-review:hover { background: #FAF089; }

  /* Marked status */
  .marked-status { text-align: center; margin-top: 9px; font-size: 12.5px; font-weight: 600; }

  /* Stats panel */
  .stats { background: white; border-radius: 18px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.09); }
  .stats h2 { font-size: 15px; font-weight: 800; color: #1A202C; margin-bottom: 18px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-box { text-align: center; border-radius: 12px; padding: 14px 8px; }
  .stat-val { font-size: 28px; font-weight: 800; }
  .stat-lbl { font-size: 11px; color: #718096; margin-top: 3px; }
  .reset-btn { background: #FED7D7; color: #9B2C2C; border: none; border-radius: 10px; padding: 9px 18px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; }
  .reset-btn:hover { background: #FEB2B2; }

  /* Sticker (showing result) */
  .sticker { position: absolute; top: 12px; right: 14px; font-size: 20px; }
</style>
</head>
<body>
<div class="app">

<div class="header">
  <h1>习概闪卡 · 32张</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span class="counter" id="counterEl">1 / 32</span>
    <button class="btn" style="flex:0;padding:5px 12px;font-size:12px;background:#E2E8F0;color:#4A5568;border-radius:8px" onclick="toggleStats()">统计</button>
  </div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="topics" id="topicChips"></div>

<!-- Main Card View -->
<div id="mainView">
  <div class="card-area" id="cardArea" onclick="flipCard()">
    <div class="card" id="cardEl">
      <div class="card-meta">
        <span class="type-badge" id="typeBadge"></span>
        <span class="flip-hint" id="flipHint">点击翻转</span>
      </div>
      <div class="card-body" id="cardBody"></div>
      <div class="hint" id="hintEl"></div>
    </div>
    <div class="sticker" id="stickerEl"></div>
  </div>

  <div class="btn-row" id="btnRow">
    <button class="btn btn-nav" onclick="navigate(-1)">←</button>
    <button class="btn btn-flip" id="mainBtn" onclick="handleMainBtn()">翻转查看答案 →</button>
    <button class="btn btn-nav" onclick="navigate(1)">→</button>
  </div>

  <div class="marked-status" id="markedStatus"></div>
</div>

<!-- Stats View -->
<div id="statsView" style="display:none">
  <div class="stats">
    <h2>学习进度统计</h2>
    <div class="stat-grid">
      <div class="stat-box" style="background:#EBF8FF">
        <div class="stat-val" style="color:#2B6CB0" id="statTotal">0</div>
        <div class="stat-lbl">已翻看</div>
      </div>
      <div class="stat-box" style="background:#F0FFF4">
        <div class="stat-val" style="color:#276749" id="statKnow">0</div>
        <div class="stat-lbl">✅ 已掌握</div>
      </div>
      <div class="stat-box" style="background:#FFFFF0">
        <div class="stat-val" style="color:#975A16" id="statReview">0</div>
        <div class="stat-lbl">🔄 需复习</div>
      </div>
    </div>
    <div style="font-size:13px;color:#718096;margin-bottom:14px" id="statsDetail"></div>
    <button class="reset-btn" onclick="resetAll()">🔁 重置全部进度</button>
  </div>
</div>

</div>

    back:"依法治国  →  党领导人民治理国家\n依法执政  →  党依法执掌国家政权\n依法行政  →  政府依法施政管理",
    hint:"" },

// State
let selectedTopic = "全部";
let currentIndex = 0;
let isFlipped = false;
let results = {}; // id -> "know" | "review"
let showingStats = false;

function getFiltered() {
  if (selectedTopic === "全部") return allCards;
  return allCards.filter(c => c.topic === selectedTopic);
}

function getCard() {
  const f = getFiltered();
  return f[currentIndex] || f[0];
}

function renderTopicChips() {
  const el = document.getElementById("topicChips");
  el.innerHTML = TOPICS.map(t => {
    const active = t.key === selectedTopic;
    return `<button class="chip ${active ? "chip-active" : "chip-inactive"}" onclick="selectTopic('${t.key}')">${t.label}</button>`;
  }).join("");
}

function selectTopic(key) {
  selectedTopic = key;
  currentIndex = 0;
  isFlipped = false;
  renderTopicChips();
  renderCard();
}

function renderCard() {
  const filtered = getFiltered();
  const card = getCard();
  if (!card) return;

  const tc = TYPE_CONFIG[card.type] || TYPE_CONFIG["列举"];

  // Update counter
  document.getElementById("counterEl").textContent = `${currentIndex + 1} / ${filtered.length}`;

  // Update progress
  const marked = Object.keys(results).filter(id => filtered.some(c => c.id === parseInt(id))).length;
  const pct = filtered.length > 0 ? Math.round((marked / filtered.length) * 100) : 0;
  document.getElementById("progressFill").style.width = pct + "%";

  // Card styling
  const cardEl = document.getElementById("cardEl");
  cardEl.style.borderLeftColor = tc.border;
  cardEl.style.background = isFlipped ? "#F7F6FF" : "white";

  // Type badge
  const icons = { "列举":"📋", "填空":"✏️", "框架":"🏗️", "解释":"💡", "匹配":"🔗" };
  const badge = document.getElementById("typeBadge");
  badge.textContent = `${icons[card.type] || ""} ${card.type}`;
  badge.style.background = tc.bg;
  badge.style.color = tc.color;

  // Flip hint
  document.getElementById("flipHint").textContent = isFlipped ? `专题${card.tNum}` : "点击卡片翻转";

  // Card body
  const body = document.getElementById("cardBody");
  if (isFlipped) {
    body.innerHTML = `<div class="answer">${card.back}</div>`;
  } else {
    body.innerHTML = `<div class="question">${card.front}</div>`;
  }

  // Hint
  const hintEl = document.getElementById("hintEl");
  if (!isFlipped && card.hint) {
    hintEl.innerHTML = `💡 记忆提示：<strong>${card.hint}</strong>`;
    hintEl.style.display = "block";
  } else {
    hintEl.style.display = "none";
  }

  // Sticker
  const st = results[card.id];
  document.getElementById("stickerEl").textContent = st === "know" ? "✅" : st === "review" ? "🔄" : "";

  // Buttons
  const btnRow = document.getElementById("btnRow");
  const mainBtn = document.getElementById("mainBtn");
  if (isFlipped) {
    btnRow.innerHTML = `
      <button class="btn btn-nav" onclick="navigate(-1)">←</button>
      <button class="btn btn-review" onclick="markCard('review')">🔄 再复习</button>
      <button class="btn btn-know" onclick="markCard('know')">✅ 已掌握</button>
      <button class="btn btn-nav" onclick="navigate(1)">→</button>
    `;
  } else {
    btnRow.innerHTML = `
      <button class="btn btn-nav" onclick="navigate(-1)">←</button>
      <button class="btn btn-flip" onclick="flipCard()">翻转查看答案 →</button>
      <button class="btn btn-nav" onclick="navigate(1)">→</button>
    `;
  }

  // Marked status
  const ms = document.getElementById("markedStatus");
  if (st) {
    ms.style.color = st === "know" ? "#276749" : "#975A16";
    ms.textContent = st === "know" ? "✅ 已标记为掌握" : "🔄 已标记为待复习";
  } else {
    ms.textContent = "";
  }
}

function flipCard() {
  isFlipped = !isFlipped;
  renderCard();
}

function navigate(dir) {
  const filtered = getFiltered();
  isFlipped = false;
  currentIndex = (currentIndex + dir + filtered.length) % filtered.length;
  renderCard();
}

function markCard(result) {
  const card = getCard();
  results[card.id] = result;
  navigate(1);
}

function toggleStats() {
  showingStats = !showingStats;
  document.getElementById("mainView").style.display = showingStats ? "none" : "block";
  document.getElementById("statsView").style.display = showingStats ? "block" : "none";
  if (showingStats) renderStats();
}

function renderStats() {
  const filtered = getFiltered();
  const markedIds = Object.keys(results).map(Number);
  const filteredMarked = markedIds.filter(id => filtered.some(c => c.id === id));
  const know = filteredMarked.filter(id => results[id] === "know").length;
  const review = filteredMarked.filter(id => results[id] === "review").length;

  document.getElementById("statTotal").textContent = filteredMarked.length;
  document.getElementById("statKnow").textContent = know;
  document.getElementById("statReview").textContent = review;

  const pct = filtered.length > 0 ? Math.round((filteredMarked.length / filtered.length) * 100) : 0;
  document.getElementById("statsDetail").textContent = 
    `当前筛选：${selectedTopic} · 进度 ${pct}% · 全库共 ${allCards.length} 张`;
}

function resetAll() {
  if (confirm("确认重置所有标记？")) {
    results = {};
    currentIndex = 0;
    isFlipped = false;
    toggleStats();
    renderCard();
  }
}

// Init
renderTopicChips();
renderCard();
</script>
