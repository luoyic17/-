<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>民诉 · 复习</title>
<style>
:root{
  --bg:#FBFAF7; --surface:#FFFFFF; --surface-2:#F3F1EC; --border:#E5E1D8;
  --ink:#1C1E22; --ink-soft:#5A5C61; --ink-faint:#8C8E93;
  --primary:#2F6F62; --primary-soft:#E2EFEB;
  --again:#B5483C; --again-soft:#F6E4E1;
  --hard:#BE8537; --hard-soft:#F6ECDB;
  --gold:#C99A2E;
  --shadow:0 1px 2px rgba(28,30,34,.05), 0 6px 22px rgba(28,30,34,.07);
  --radius:14px;
  --font-sans:system-ui,-apple-system,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif;
  --font-mono:ui-monospace,"SF Mono",Menlo,Consolas,"Liberation Mono",monospace;
}
[data-theme="dark"]{
  --bg:#14161B; --surface:#1E212A; --surface-2:#262A34; --border:#333845;
  --ink:#E9E7E1; --ink-soft:#AEB2BB; --ink-faint:#7C818C;
  --primary:#5BA493; --primary-soft:#21302C;
  --again:#D9695C; --again-soft:#34201E;
  --hard:#D69A4F; --hard-soft:#322A1C;
  --gold:#E0B84A;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 26px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-family:var(--font-sans);
  line-height:1.6; -webkit-font-smoothing:antialiased; min-height:100vh;
}
button{font-family:inherit; cursor:pointer; color:inherit}
.eyebrow{font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-faint)}
.wrap{max-width:760px; margin:0 auto; padding:0 20px}

/* header */
header{position:sticky; top:0; z-index:20; background:color-mix(in srgb, var(--bg) 86%, transparent); backdrop-filter:saturate(140%) blur(8px); border-bottom:1px solid var(--border)}
.hbar{max-width:760px; margin:0 auto; padding:13px 20px; display:flex; align-items:center; gap:12px}
.brand{font-weight:650; letter-spacing:.01em; font-size:15px}
.brand .dot{color:var(--primary)}
.hsp{flex:1}
.ico{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:7px 12px; font-size:13px; font-weight:550; transition:.15s}
.ico:hover{border-color:var(--ink-faint)}
.ico.sq{padding:7px 10px}

/* home */
.hero{padding:34px 0 8px}
.hero .lead{font-size:13px; color:var(--ink-soft); margin:0 0 6px}
.bignum{font-family:var(--font-mono); font-size:clamp(40px,11vw,64px); font-weight:600; line-height:1; letter-spacing:-.02em}
.bignum .of{color:var(--ink-faint); font-size:.42em; font-weight:500; letter-spacing:0}
.bignum .tag{color:var(--primary)}
.subnote{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint); margin-top:10px; letter-spacing:.02em}

/* mastery bar — signature */
.mbar{display:flex; height:14px; border-radius:7px; overflow:hidden; margin:18px 0 8px; background:var(--surface-2); border:1px solid var(--border)}
.mseg{height:100%; transition:flex-grow .5s ease}
.mseg.s0{background:var(--again)} .mseg.s1{background:var(--hard)} .mseg.s2{background:var(--primary)}
.mleg{display:flex; gap:18px; font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); flex-wrap:wrap}
.mleg b{font-weight:600; color:var(--ink)}
.mleg .sw{display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:6px; vertical-align:middle}
.sw.s0{background:var(--again)} .sw.s1{background:var(--hard)} .sw.s2{background:var(--primary)}

/* start card + exam row */
.start-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px; margin:30px 0 14px}
.start-hint{font-size:14.5px; color:var(--ink-soft); margin-bottom:18px; line-height:1.65}
.start-btn{width:100%; background:var(--primary); color:#fff; border:none; border-radius:12px; padding:16px; font-size:16px; font-weight:650; transition:.15s}
[data-theme="dark"] .start-btn{color:#0c130f}
.start-btn:hover{filter:brightness(1.05)}
.mode-row{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.mode-btn{display:flex; flex-direction:column; gap:4px; align-items:flex-start; text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 15px; transition:.15s}
.mode-btn:hover{border-color:var(--primary); transform:translateY(-1px)}
.mode-btn .mt{font-weight:650; font-size:15.5px}
.mode-btn.fast .mt{color:var(--primary)}
.mode-sub{font-size:11.5px; color:var(--ink-faint); line-height:1.45}
@media (max-width:520px){ .mode-row{grid-template-columns:1fr} }
.exam-row{display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--ink-faint); margin:0; flex-wrap:wrap; min-height:24px}
.ex-set{background:none; border:none; color:var(--ink-soft); font-size:12.5px; padding:4px 0; cursor:pointer; text-decoration:underline; text-underline-offset:2px}
.ex-set:hover{color:var(--ink)}
.ex-count{font-family:var(--font-mono); color:var(--primary)}
.ex-edit{background:none; border:none; color:var(--ink-faint); font-size:12px; cursor:pointer; text-decoration:underline; text-underline-offset:2px}
.ex-edit:hover{color:var(--ink)}
.go{background:var(--primary); color:#fff; border:none; border-radius:10px; padding:9px 20px; font-weight:600; font-size:14px; transition:.15s; box-shadow:0 1px 0 rgba(0,0,0,.04)}
[data-theme="dark"] .go{color:#0c130f}
.go:hover{filter:brightness(1.05)}
.go:disabled{background:var(--surface-2); color:var(--ink-faint); cursor:not-allowed}

.home-foot{margin:26px 0 50px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.ghost{background:none; border:1px solid var(--border); border-radius:9px; padding:7px 13px; font-size:12.5px; color:var(--ink-soft); transition:.15s}
.ghost:hover{border-color:var(--ink-faint); color:var(--ink)}
.foot-note{font-size:11.5px; color:var(--ink-faint); margin-top:14px; line-height:1.7}

/* empty state */
.empty{text-align:center; padding:60px 20px}
.empty h2{font-size:19px; margin:0 0 8px}
.empty p{color:var(--ink-soft); font-size:14px; margin:0 0 20px}

/* review */
.rev-head{position:sticky; top:53px; z-index:10; background:var(--bg); border-bottom:1px solid var(--border)}
.rev-head .rh{max-width:760px; margin:0 auto; padding:11px 20px; display:flex; align-items:center; gap:12px}
.linkbtn{background:none; border:none; font-size:13px; color:var(--ink-soft); padding:4px 2px}
.linkbtn:hover{color:var(--ink)}
.rev-title{flex:1; text-align:center; font-size:13.5px; font-weight:600}
.rev-title .rem{font-family:var(--font-mono); color:var(--ink-faint); font-weight:500; margin-left:4px}
.prog{height:3px; background:var(--surface-2)}
.prog .fill{height:100%; background:var(--primary); width:0; transition:width .3s ease}

.card{background:var(--surface); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); padding:26px 26px 22px; margin:26px 0; min-height:auto}
.card .ctop{display:flex; align-items:center; gap:9px; margin-bottom:16px; flex-wrap:wrap}
.badge{font-family:var(--font-mono); font-size:11px; font-weight:600; padding:3px 9px; border-radius:6px; letter-spacing:.02em}
.badge.lvl0{color:var(--again); background:var(--again-soft)}
.badge.lvl1{color:var(--hard); background:var(--hard-soft)}
.badge.lvl2{color:var(--primary); background:var(--primary-soft)}
.chapchip{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-soft); background:var(--surface-2); padding:3px 9px; border-radius:6px}
.star{font-size:13px; color:var(--gold)}
.stem{font-size:18px; line-height:1.7; white-space:pre-wrap; word-break:break-word}
.opts{margin-top:14px; font-size:15.5px; line-height:1.9; white-space:pre-wrap; color:var(--ink); word-break:break-word}
.divider{display:flex; align-items:center; gap:12px; margin:22px 0 12px; color:var(--ink-faint)}
.divider::before,.divider::after{content:""; height:1px; background:var(--border); flex:1}
.divider span{font-family:var(--font-mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase}
.answer{font-size:16px; font-weight:600; white-space:pre-wrap; word-break:break-word; color:var(--primary)}
.analysis{font-size:15px; line-height:1.8; white-space:pre-wrap; word-break:break-word; color:var(--ink-soft); margin-top:4px}
.cfoot{display:flex; align-items:center; gap:14px; margin-top:18px; padding-top:14px; border-top:1px solid var(--border)}
.seen{font-family:var(--font-mono); font-size:11.5px; color:var(--ink-faint)}
.memtog{margin-left:auto; background:none; border:1px solid var(--border); border-radius:8px; padding:5px 11px; font-size:12px; color:var(--ink-soft); transition:.15s; display:inline-flex; align-items:center; gap:6px}
.memtog.on{color:var(--gold); border-color:var(--gold)}
.memtog:hover{border-color:var(--ink-faint)}

.reveal{width:100%; background:var(--ink); color:var(--bg); border:none; border-radius:12px; padding:15px; font-size:15px; font-weight:600; margin-top:22px; transition:.15s}
.reveal:hover{opacity:.9}
.reveal .k{font-family:var(--font-mono); font-size:11px; opacity:.7; margin-left:8px; border:1px solid currentColor; border-radius:5px; padding:1px 6px}

.grades{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:22px}
.grades.grades-2{grid-template-columns:repeat(2,1fr); gap:12px}
.gbtn{border:1.5px solid var(--border); background:var(--surface); border-radius:12px; padding:14px 8px 11px; font-size:15px; font-weight:650; transition:.13s; display:flex; flex-direction:column; align-items:center; gap:4px}
.gbtn .k{font-family:var(--font-mono); font-size:11px; font-weight:500; color:var(--ink-faint); border:1px solid var(--border); border-radius:5px; padding:0 6px}
.gbtn .sub{font-size:11px; font-weight:500; color:var(--ink-faint)}
.gbtn.again{color:var(--again)} .gbtn.again:hover{background:var(--again-soft); border-color:var(--again)}
.gbtn.good{color:var(--primary)} .gbtn.good:hover{background:var(--primary-soft); border-color:var(--primary)}
.khint{text-align:center; font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:14px; letter-spacing:.02em}

/* skim */
.skim-card{background:var(--surface); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow); padding:30px 26px; margin:26px 0; text-align:left}
.skim-hint{text-align:center; color:var(--ink-faint); font-size:12.5px; margin-bottom:6px}
.nextbtn{width:100%; background:var(--primary); color:#fff; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:600; margin-top:18px}
[data-theme="dark"] .nextbtn{color:#0c130f}

/* summary */
.summary{text-align:center; padding:50px 0}
.summary .big{font-size:46px; margin:0 0 6px}
.summary h2{font-size:22px; margin:0 0 6px}
.summary p{color:var(--ink-soft); font-size:14px; margin:0 0 26px}
.stat-row{display:flex; justify-content:center; gap:26px; margin:24px 0 30px; flex-wrap:wrap}
.stat{text-align:center}
.stat .n{font-family:var(--font-mono); font-size:30px; font-weight:600}
.stat .l{font-size:12px; color:var(--ink-faint)}

/* manage */
.mg-head{display:flex; align-items:center; gap:10px; margin:26px 0 18px; flex-wrap:wrap}
.mg-head h2{font-size:20px; margin:0; flex:1}
.add{background:var(--primary); color:#fff; border:none; border-radius:9px; padding:8px 16px; font-weight:600; font-size:13.5px}
[data-theme="dark"] .add{color:#0c130f}
.mg-count{font-family:var(--font-mono); font-size:12px; color:var(--ink-faint); width:100%}
.qrow{background:var(--surface); border:1px solid var(--border); border-radius:11px; padding:12px 14px; margin-bottom:9px; display:flex; align-items:flex-start; gap:11px}
.qrow .qbadge{margin-top:2px}
.qrow .qtext{flex:1; min-width:0}
.qrow .qstem{font-size:14px; line-height:1.5; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical}
.qrow .qmeta{font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); margin-top:3px}
.qact{display:flex; gap:4px; flex:none}
.tiny{background:none; border:1px solid var(--border); border-radius:7px; padding:4px 9px; font-size:12px; color:var(--ink-soft)}
.tiny:hover{border-color:var(--ink-faint); color:var(--ink)}
.tiny.del:hover{color:var(--again); border-color:var(--again)}

/* editor / modal */
.modal{position:fixed; inset:0; background:rgba(0,0,0,.45); display:flex; align-items:flex-start; justify-content:center; padding:30px 16px; z-index:40; overflow-y:auto}
.sheet{background:var(--surface); border-radius:16px; width:100%; max-width:620px; padding:22px; box-shadow:var(--shadow); margin:auto 0}
.sheet h3{margin:0 0 16px; font-size:17px}
.field{margin-bottom:14px}
.field label{display:block; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px}
.field input[type=text],.field input[type=datetime-local],.field textarea{width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:10px 12px; font-family:inherit; font-size:14px; color:var(--ink); resize:vertical; line-height:1.6}
.field textarea:focus,.field input:focus{outline:none; border-color:var(--primary)}
.cbline{display:flex; align-items:center; gap:9px; font-size:14px; color:var(--ink-soft)}
.cbline input{width:18px; height:18px; accent-color:var(--gold)}
.sheet-foot{display:flex; gap:10px; justify-content:flex-end; margin-top:8px}
.help{background:var(--surface-2); border-radius:9px; padding:11px 13px; font-family:var(--font-mono); font-size:11.5px; line-height:1.85; color:var(--ink-soft); white-space:pre-wrap; margin-bottom:14px}
.notice{font-size:14.5px; line-height:1.65; color:var(--ink); margin-bottom:18px; white-space:pre-wrap}
.danger-btn{background:var(--again); color:#fff; border:none; border-radius:9px; padding:8px 16px; font-weight:600; font-size:13.5px}
[data-theme="dark"] .danger-btn{color:#1a0f0e}

:focus-visible{outline:2px solid var(--primary); outline-offset:2px}
.hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <span class="brand">民诉 <span class="dot">·</span> 复习</span>
    <span class="hsp"></span>
    <button class="ico sq" id="themeBtn" title="切换深浅色">☾</button>
    <button class="ico" id="navManage">题库</button>
  </div>
</header>

<main id="app"></main>

<script>
"use strict";

/* ---------- storage ---------- */
const K_CARDS='minsu_srs_cards', K_SET='minsu_srs_settings', K_DECK='minsu_srs_deckver';
const DECK_VERSION='minsu80-v2';   // 内置题库版本；与本地不一致时，首次打开会载入内置题库
function uid(){ try{ if(crypto&&crypto.randomUUID) return crypto.randomUUID(); }catch(e){} return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function load(key,fallback){ try{ const v=localStorage.getItem(key); return v==null?fallback:JSON.parse(v);}catch(e){return fallback;} }
function save(){ try{ localStorage.setItem(K_CARDS,JSON.stringify(state.cards)); }catch(e){} }
function saveSettings(){ try{ localStorage.setItem(K_SET,JSON.stringify(settings)); }catch(e){} }

function makeCard(o){ o=o||{}; return {
  id:uid(), chapter:o.chapter||'', question:o.question||'', options:o.options||'',
  answer:o.answer||'', analysis:o.analysis||'', flagMemory:!!o.flagMemory,
  level:o.level||0, seen:o.seen||0
}; }

/* ---------- pre-loaded questions ---------- */
const SAMPLES=[{"chapter":"单选","question":"下列关于民事诉讼基本原则的表述，哪一项是正确的？","options":"A. 当事人诉讼权利平等原则意味着当事人拥有相同的诉讼权利\nB. 辩论原则仅适用于法庭辩论阶段\nC. 处分原则是指当事人可以自由处分自己的实体权利和诉讼权利\nD. 诚实信用原则仅适用于当事人，不适用于法院和其他诉讼参与人","answer":"答案：C","analysis":"考点：民事诉讼四大基本原则——诉讼权利平等原则、辩论原则、处分原则、诚实信用原则\n\n讲解：\n民事诉讼的基本原则就像\"游戏规则\"：处分原则好比\"你的权利你做主\"，你可以决定要不要起诉、要不要撤诉、要不要放弃某些请求；辩论原则贯穿整个诉讼过程，不只是在法庭辩论阶段才能辩；诉讼权利\"平等\"不等于\"相同\"，原告能起诉，被告能反诉，权利对等但不完全一样。\n\n逐项：\nA ✗ \"平等\"≠\"相同\"。原告有起诉权，被告有反诉权，双方地位平等但具体权利不同。\nB ✗ 辩论原则贯穿民事诉讼全过程（从起诉到判决），不只是法庭辩论那个环节。\nC ✓ 处分原则的核心就是当事人可以自由支配自己的实体权利（如放弃债权）和诉讼权利（如撤诉、和解）。\nD ✗ 诚信原则适用于所有诉讼参与人和法院，不仅仅约束当事人。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"甲与乙因合同纠纷诉至法院，法院受理后，丙认为该合同标的物是自己的，要求参加诉讼。丙在诉讼中的地位是","options":"A. 共同原告\nB. 共同被告\nC. 有独立请求权第三人\nD. 无独立请求权第三人","answer":"答案：C","analysis":"考点：有独立请求权第三人的认定\n\n讲解：\n甲和乙打官司争一个东西，丙跳出来说\"这东西是我的！\"——丙既不站甲那边，也不站乙那边，他是独立主张权利的，所以是\"有独立请求权的第三人\"。如果丙只是和案件结果有利害关系但不独立主张权利，才是\"无独立请求权第三人\"。\n\n逐项：\nA ✗ 丙不是和甲一起告乙，丙是独立主张权利。\nB ✗ 丙不是被告一方。\nC ✓ 丙对甲乙之间的诉讼标的物主张独立的所有权，是有独立请求权第三人。\nD ✗ 无独立请求权第三人是与案件处理结果有利害关系但不独立主张权利的人，丙独立主张权利，不属于此类。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"下列哪种案件可以适用简易程序审理？","options":"A. 起诉时被告下落不明的案件\nB. 发回重审的案件\nC. 共同诉讼中一方当事人人数众多的案件\nD. 事实清楚、权利义务关系明确、争议不大的简单民事案件","answer":"答案：D","analysis":"考点：简易程序的适用条件与排除情形\n\n讲解：\n简易程序是\"轻装上阵\"的审判方式——只有简单案件才能用。记住不能用简易程序的三种情况：被告找不到人（下落不明）、重审案件、人数众多的共同诉讼。核心标准就是\"三清\"：事实清楚、权利义务明确、争议不大。\n\n逐项：\nA ✗ 被告下落不明需要公告送达，不适合简易程序。\nB ✗ 发回重审的案件必须用普通程序。\nC ✗ 一方人数众多的共同诉讼案件复杂，不能用简易程序。\nD ✓ 这就是简易程序的经典适用条件：\"三清\"标准。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"人民法院适用普通程序审理的案件，应当在立案之日起（　）内审结。","options":"A. 三个月\nB. 六个月\nC. 九个月\nD. 一年","answer":"答案：B","analysis":"考点：审限规定\n\n讲解：\n记住审限口诀：\"普通六个月，简易三个月，小额更快\"。普通程序6个月，院长批准可延长6个月，还需要延长的要报上级法院批准。\n\n逐项：\nA ✗ 三个月是简易程序的审限。\nB ✓ 普通程序审限为立案之日起六个月。\nC ✗ 无此规定。\nD ✗ 无此规定。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"下列关于证据的表述，正确的是","options":"A. 书证应当提交原件，提交原件确有困难的，可以提交复制品、照片、副本、节录本\nB. 证人必须是自然人，单位不能作为证人\nC. 鉴定意见必须由法院指定的鉴定机构作出\nD. 视听资料不能单独作为认定案件事实的依据","answer":"答案：A","analysis":"考点：证据规则——书证、证人、鉴定意见、视听资料\n\n讲解：\n\"最佳证据规则\"要求书证提交原件，但法律也给了变通——确有困难可以交复印件。证人不只是自然人，单位也可以出具证明。鉴定机构可以先由双方协商选定。视听资料如果满足条件是可以单独定案的。\n\n逐项：\nA ✓ 法律原文规定，书证以原件为原则，困难时可提交复制品等。\nB ✗ 单位也可以作为证人提供证明。\nC ✗ 鉴定机构先由当事人协商确定，协商不成法院才指定。\nD ✗ 视听资料在满足真实性等条件时可以单独作为定案依据。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"甲向法院起诉乙要求偿还借款，乙在答辩中称借款已经偿还，并提供了甲出具的收条。乙提供收条的行为属于","options":"A. 本证\nB. 反证\nC. 直接证据\nD. 间接证据","answer":"答案：A","analysis":"考点：本证与反证的区分\n\n讲解：\n本证和反证的区分标准是\"谁负有证明责任\"。乙说\"我已经还钱了\"，乙对\"已还款\"这个事实负证明责任，所以乙提供收条来证明自己主张的事实，这就是本证。如果乙不主张\"已还款\"，只是提供证据动摇甲的主张，那才是反证。关键口诀：\"证明自己主张的事实 = 本证\"。\n\n逐项：\nA ✓ 乙对\"已还款\"负证明责任，收条用于证明乙的主张，属于本证。\nB ✗ 反证是不负证明责任的一方提出的用于反驳对方主张的证据。\nC ✗ 本题考查的是本证/反证的分类，不是直接/间接证据的分类（虽然收条也是直接证据，但题目问的是\"乙提供收条的行为属于\"哪种分类中的）。\nD ✗ 同上，不是本题考查的分类维度。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"人民法院对下列哪种案件，根据当事人的申请，可以裁定先予执行？","options":"A. 追索劳动报酬的案件\nB. 解除收养关系的案件\nC. 要求确认合同效力的案件\nD. 要求返还借款的案件","answer":"答案：A","analysis":"考点：先予执行的适用范围\n\n讲解：\n先予执行就是\"等不及判决结果，先给钱/先做事\"。法律列举了三类：①追索赡养费、抚养费、医疗费等生活急需的费用；②追索劳动报酬；③情况紧急需要先予执行的。核心特征是当事人生活急需或情况紧急。\n\n逐项：\nA ✓ 追索劳动报酬是法定的先予执行情形。\nB ✗ 解除收养关系是身份关系纠纷，不涉及先予执行。\nC ✗ 确认合同效力是确认之诉，没有给付内容，无法先予执行。\nD ✗ 普通借款纠纷不属于法定先予执行范围（除非情况紧急）。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"下列关于第二审程序的表述，错误的是","options":"A. 第二审程序是终审程序\nB. 第二审人民法院对上诉案件，应当组成合议庭，开庭审理\nC. 第二审人民法院对上诉案件，经过审理，认为原判决认定事实清楚，适用法律正确的，判决驳回上诉，维持原判决\nD. 当事人对第一审判决不服的，有权在判决书送达之日起15日内向上一级人民法院提起上诉","answer":"答案：B","analysis":"考点：二审程序的审理方式\n\n讲解：\n二审虽然原则上应该开庭审理，但有例外：如果经过阅卷、调查和询问当事人后，合议庭认为没有新的事实、证据或理由，不需要开庭审理的，可以不开庭审理（书面审理）。B选项说\"应当开庭审理\"过于绝对，所以是错误的。\n\n逐项：\nA ✓ 我国实行两审终审制，二审就是终审。\nB ✗（选此项） 二审原则上开庭审理，但满足条件时可以不开庭。\"应当\"太绝对。\nC ✓ 认定事实清楚、适用法律正确→驳回上诉，维持原判，这是正确表述。\nD ✓ 判决上诉期15日，裁定上诉期10日，这是基本功。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"下列关于审判监督程序的表述，正确的是","options":"A. 审判监督程序是一审、二审程序之外的独立的审判程序\nB. 当事人申请再审，应当在判决、裁定发生法律效力后一年内提出\nC. 人民法院按照审判监督程序再审的案件，一律适用二审程序审理\nD. 最高人民检察院对各级人民法院已经发生法律效力的判决、裁定，发现有错误的，可以直接向同级人民法院提出抗诉","answer":"答案：A","analysis":"考点：审判监督程序（再审程序）的基本规则\n\n讲解：\n再审程序是\"纠错机制\"，不是必经程序。关键记住三点：①再审申请期限是六个月（不是一年）；②再审适用的程序看原审——原审是一审判决生效的就按一审程序审，原审是二审的就按二审程序审（不是一律二审）；③最高检发现错误应向最高法抗诉，不是向同级法院。\n\n逐项：\nA ✓ 再审程序确实是独立于一审、二审之外的特殊救济程序。\nB ✗ 期限是六个月，不是一年。\nC ✗ 不是一律适用二审程序，要看原生效裁判是由哪级法院作出的。\nD ✗ 最高检发现各级法院的错误应向最高人民法院提出抗诉，不是向同级法院。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"下列关于执行程序的表述，错误的是","options":"A. 发生法律效力的民事判决、裁定，以及刑事判决、裁定中的财产部分，由第一审人民法院或者与第一审人民法院同级的被执行的财产所在地人民法院执行\nB. 申请执行的期间为二年\nC. 执行员接到申请执行书或者移交执行书，应当向被执行人发出执行通知，并可以立即采取强制执行措施\nD. 被执行人未按执行通知履行法律文书确定的义务，人民法院可以对其采取或者通知有关单位协助采取限制出境措施，但不能在征信系统记录其信息","answer":"答案：D","analysis":"考点：执行措施的种类\n\n讲解：\n执行措施就是法院\"逼\"老赖履行义务的手段，非常多样：限制出境、征信系统记录（上\"黑名单\"）、媒体公布等等，D说\"不能在征信系统记录\"是错的——现在法院完全可以把老赖上征信黑名单。\n\n逐项：\nA ✓ 这是法律对执行管辖的原文规定。\nB ✓ 申请执行期间为二年，从法律文书规定的履行期间最后一日起算。\nC ✓ 执行通知发出后，可以立即采取强制执行措施。\nD ✗（选此项） 法院完全可以在征信系统记录被执行人信息，这是重要的惩戒手段。D选项说\"不能\"，错误。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"张三起诉李四要求解除合同，在案件审理的过程中，张三变更诉讼请求，要求李四承担违约责任并继续履行合同。下列说法中正确的有？","options":"A. 张三作出的是对诉讼请求的变更\nB. 张三应当先申请撤回起诉，之后再另行起诉\nC. 对张三请求的继续履行和违约责任，法院应作出诉的合并审理\nD. 张三作出的是对诉讼标的的变更","answer":"答案：A","analysis":"考点：诉的变更——诉讼请求变更与诉讼标的变更的区分\n\n讲解：\n张三原来要\"解除合同\"，后来改成要\"继续履行合同+违约责任\"。诉讼标的（基础法律关系）始终是同一个合同关系，没有变。变的只是在这个合同关系下提出的具体请求内容（从解除变为履行+违约），所以是诉讼请求的变更，不是诉讼标的的变更。\n\n逐项：\nA ✓ 诉讼标的不变（都是同一合同），只是请求内容变了，属于诉讼请求的变更。\nB ✗ 变更诉讼请求不需要先撤诉再重新起诉，可以直接在诉讼中变更。\nC ✗ 这是一个诉的请求变更，不是诉的合并。\nD ✗ 诉讼标的（合同关系）没变，变的是诉讼请求。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"住所地位于甲市的A将自己的玉石借给住所地位于乙市的B进行展览，住所地位于丙市的C不知玉石是A的，以20万元的价格从B处将该玉石买下。B对A谎称以15万元的价格将玉石卖出，后来A得知B实际上是以20万元的价格出售的玉石，于是诉至法院要求B返还差额5万元。本案的管辖法院是","options":"A. 甲市法院\nB. 乙市法院\nC. 丙市法院\nD. 甲市法院和乙市法院均有管辖权","answer":"答案：B","analysis":"考点：一般地域管辖——\"原告就被告\"原则\n\n讲解：\n本案A起诉B要求返还差额，属于普通民事纠纷。既没有专属管辖的情形，也没有协议管辖，适用的就是最基本的\"原告就被告\"原则——到被告住所地法院起诉。被告B住所地在乙市，所以乙市法院管辖。\n\n逐项：\nA ✗ 甲市是原告A的住所地，不适用。\nB ✓ 乙市是被告B的住所地，\"原告就被告\"，乙市法院有管辖权。\nC ✗ 丙市是C的住所地，C不是本案当事人。\nD ✗ 只有乙市法院有管辖权。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"王某与胜达公司订立了商品房买卖合同，后胜达公司拒绝交付房屋，王某根据仲裁条款向设立在乙市的仲裁委员会申请仲裁。在仲裁过程中，王某申请先予执行。关于本案，下列选项中说法正确的有？","options":"A. 王某无权申请先予执行\nB. 王某应当向乙市仲裁委提出申请，由乙市仲裁委将申请转交法院\nC. 王某应当向房屋所在地的基层人民法院申请先予执行\nD. 王某应当向乙市仲裁委所在地的基层人民法院申请先予执行","answer":"答案：A","analysis":"考点：仲裁中的先予执行问题\n\n讲解：\n仲裁程序中，当事人可以申请财产保全（向仲裁委提出，由仲裁委转交法院），但先予执行只适用于诉讼程序中的特定案件（追索赡养费、劳动报酬等）。仲裁案件不适用先予执行制度，所以王某无权申请。\n\n逐项：\nA ✓ 仲裁程序中不适用先予执行，王某无权申请。\nB ✗ 仲裁中可以申请财产保全（通过仲裁委转交法院），但不能申请先予执行。\nC ✗ 先予执行制度不适用于仲裁程序。\nD ✗ 同上。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"朱某起诉杨某离婚，经法院调解双方同意离婚并达成协议。送达调解书时，朱某签收了，杨某因有事未能签收。此时朱某反悔，法院正确的处理方式是？","options":"A. 根据案件事实及时制作判决书\nB. 根据调解协议制作判决书\nC. 朱某可以反悔，撤回起诉\nD. 朱某不能反悔，法院应当继续向杨某送达调解书","answer":"答案：D","analysis":"考点：调解书的生效——\"双方签收才生效\"规则的例外\n\n讲解：\n一般民事调解书要双方都签收才生效，一方签收另一方没签收的，任何一方都可以反悔。但离婚调解书是例外——解除婚姻关系的调解书经审判人员和书记员署名以及双方当事人签名后即生效，不以送达为准。本题中调解协议已经达成，朱某不能反悔。\n\n逐项：\nA ✗ 调解已达成，不需要另行制作判决书。\nB ✗ 不需要\"根据调解协议制作判决书\"，调解书本身即可。\nC ✗ 朱某不能以反悔为由撤诉，调解协议已经成立。\nD ✓ 解除婚姻关系的调解协议已经达成，朱某不能反悔，法院应继续向杨某送达。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"下列各情形中，可以成立自认的有？","options":"A. 被告提交了诉讼前的书面材料，记载其向原告借款20万元的事实及借款过程\nB. 庭审结束后，被告跟原告说：\"我借了你5万元，的确是事实，但是在法庭上我就不承认\"\nC. 被告在证据交换中承认借款5万元，但主张已还款。开庭时被告说\"既然他不承认还款，那我也不承认借款\"\nD. 原告主张被告借款5万元，法官问被告是否借款5万元，被告说当时向好几个同事借款，已经记不清","answer":"答案：D","analysis":"考点：自认的构成要件与默示自认\n\n讲解：\n自认必须满足三个条件：①在法庭审理中或在起诉状、答辩状、代理词等书面材料中作出；②对于己不利的事实；③明确表示承认。A是诉讼前形成的材料，不是在法庭中作出的；B是庭审结束后的私下说话；C被告在证据交换中自认后又撤回（涉及附条件自认和撤回自认的问题）。D中被告\"记不清\"——法官充分说明并询问后，当事人不明确表示肯定或否定的，视为对该事实的承认，属于默示自认。\n\n逐项：\nA ✗ 诉讼前形成的书面材料不属于自认的场合（不是在法庭审理中或答辩状等中作出的）。\nB ✗ 庭审结束后的私下承认不构成自认，必须在法定场合中。\nC ✗ 被告在证据交换中自认后试图撤回，但自认的撤回需要满足严格条件，况且\"既然他不承认还款那我也不承认借款\"属于不当撤回，此题选项C的情形需要具体分析。本题答案选D。\nD ✓ 经法官询问后说\"记不清\"，属于默示自认——不明确否认即视为承认。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"王某诉钱某返还借款案审理中，王某提交了借条，钱某提交了收条。经质证，双方确认是同一笔款项。关于本案，下列哪一选项是错误的？","options":"A. 王某承担钱某向其借款事实的证明责任\nB. 钱某自认了向王某借款的事实\nC. 钱某提交的收条是案涉借款事实的反证\nD. 钱某提交的收条是案涉还款事实的本证","answer":"答案：C","analysis":"考点：本证与反证的区分、自认、证明责任\n\n讲解：\n钱某提交收条是为了证明\"我已经还钱了\"（还款事实），对还款事实钱某负证明责任，所以收条是还款事实的本证（D正确）。而C说收条是\"借款事实的反证\"是错的——收条恰恰是对借款事实的间接肯定（你都还钱了，说明确实借了钱），根本不是用来否定借款事实的反证。\n\n逐项：\nA ✓ 原告王某主张借款事实，应承担相应的证明责任。\nB ✓ 钱某提交收条本身就说明他承认了借款事实（还款的前提是借款），构成自认。\nC ✗（选此项） 收条不是\"借款事实的反证\"，相反它间接证实了借款。收条是还款事实的本证。\nD ✓ 钱某对还款事实负证明责任，收条证明他的还款主张，是本证。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"关于审判组织的适用，下列哪一选项是正确的？","options":"A. 适用简易程序审理的案件，上诉后发回重审的，可由审判员独任审判\nB. 适用简易程序审理的案件，判决生效后启动再审的，可由审判员独任审判\nC. 适用普通程序审理的案件，当事人双方同意，经上级法院批准，可由审判员独任审判\nD. 适用选民资格案件审理程序的案件，应组成合议庭审理，而且只能由审判员组成合议庭","answer":"答案：D","analysis":"考点：审判组织——独任制与合议庭的适用\n\n讲解：\n核心规则：发回重审→必须组成合议庭（不能独任）；再审→必须组成合议庭（不能独任）。选民资格案件属于特别程序中的特殊类型——重大、疑难，必须组成合议庭，且只能由审判员组成（不含人民陪审员）。\n\n逐项：\nA ✗ 发回重审的案件必须组成合议庭，不能独任审判。\nB ✗ 再审程序必须组成合议庭，不能独任审判。\nC ✗ 普通程序的独任审理经本院院长批准即可（不需要上级法院批准），且有适用限制。\nD ✓ 选民资格案件属于特别程序中的重大疑难案件，必须由审判员组成合议庭审理。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"冉某诉潘某借款纠纷，法院判决驳回冉某的诉讼请求，冉某拟提出上诉，但在上诉期间因车祸失去意识，一个月后不幸身亡。关于本案，下列说法中正确的是？","options":"A. 当事人已经死亡，法院应裁定终结诉讼\nB. 冉某继承人可以申请法院顺延上诉期限\nC. 冉某继承人可以向法院申请继承冉某的诉讼地位\nD. 上诉期限已过，一审判决生效","answer":"答案：C","analysis":"考点：当事人死亡与诉讼继承\n\n讲解：\n冉某在上诉期内死亡，但这个案件涉及的是金钱债权（借款），是可以继承的。冉某的继承人可以继承冉某的诉讼地位，继续进行诉讼。这不是终结诉讼，也不是简单的顺延期限。\n\n逐项：\nA ✗ 冉某的诉讼请求（借款债权）可以继承，不应终结诉讼。\nB ✗ 不是简单的顺延期限问题，而是诉讼主体继承的问题。\nC ✓ 冉某的继承人可以继承其诉讼地位，继续参加诉讼。\nD ✗ 不能简单地认为上诉期已过。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"海昌公司因丢失票据申请公示催告，期间届满无人申报权利，海昌公司遂申请除权判决。在除权判决作出前，家佳公司看到公告向法院申报权利。对此法院的做法是？","options":"A. 因公示催告期满，裁定驳回家佳公司的权利申报\nB. 裁定追加家佳公司参加案件的除权判决审理程序\nC. 应裁定终结公示催告程序\nD. 作出除权判决，告知家佳公司另行起诉","answer":"答案：C","analysis":"考点：公示催告程序——权利申报的时间\n\n讲解：\n公示催告的本质是\"喊话\"——\"有人对这张票据有权利吗？没有的话就宣告无效了\"。虽然公示催告期已满，但除权判决作出前仍有人申报权利的，法院应当裁定终结公示催告程序。关键时间节点是\"除权判决作出前\"，不是\"公示催告期满前\"。\n\n逐项：\nA ✗ 虽然期间届满，但除权判决作出前有人申报权利的，不能驳回。\nB ✗ 不是追加家佳公司参加除权判决程序。\nC ✓ 除权判决作出前有人申报权利的，法院应裁定终结公示催告程序。\nD ✗ 不能无视权利申报直接作出除权判决。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"郑某因与某公司发生合同纠纷，委托马律师全权代理诉讼，但未作具体的授权。此种情况下，马律师在诉讼中有权实施下列哪一行为？","options":"A. 提出管辖权异议\nB. 提起反诉\nC. 提起上诉\nD. 部分变更诉讼请求","answer":"答案：A","analysis":"考点：一般授权与特别授权的区分\n\n讲解：\n委托代理有两种授权范围：一般授权和特别授权。\"全权代理\"但未作具体授权的＝一般授权（注意这个陷阱！\"全权代理\"≠特别授权）。一般授权代理人只能进行一般性诉讼行为（如提出证据、提管辖权异议等），不能进行处分性行为。特别授权才能做的事情包括：承认/放弃/变更诉讼请求、进行和解、提起反诉或上诉。口诀：\"认、放、变、和、反、上\"需要特别授权。\n\n逐项：\nA ✓ 提出管辖权异议是一般性诉讼行为，一般授权即可。\nB ✗ 提起反诉是处分性行为，需要特别授权。\nC ✗ 提起上诉是处分性行为，需要特别授权。\nD ✗ 变更诉讼请求是处分性行为，需要特别授权。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"根据相关司法解释，下列哪个法院对专利纠纷案件不享有管辖权？","options":"A. 知识产权法院\nB. 所有的中级法院\nC. 最高法院确定的中级法院\nD. 最高法院确定的基层法院","answer":"答案：B","analysis":"考点：专利纠纷案件的管辖\n\n讲解：\n专利纠纷案件管辖有特殊规定，并非所有中院都能审。有权管辖的法院是：知识产权法院、最高法院确定的中级法院、最高法院确定的基层法院。关键：不是所有中院都行，必须是最高院\"点名\"的中院。\n\n逐项：\nA ✗ 知识产权法院有管辖权。\nB ✓（选此项） 并非所有中级法院都有管辖权，只有最高院确定的中院才有。\nC ✗ 最高法院确定的中级法院有管辖权。\nD ✗ 最高法院确定的基层法院也有管辖权。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"许某发现人民陪审员丙与被告法定代表人是亲兄弟，遂提出回避申请。关于本案的回避，下列哪一说法是正确的？","options":"A. 许某可在知道丙与被告法定代表人是亲兄弟时提出回避申请\nB. 法院对回避申请作出决定前，丙不停止参与本案审理\nC. 应由审判长决定丙是否应回避\nD. 法院作出回避决定后，许某可对此提出上诉","answer":"答案：A","analysis":"考点：回避制度——提出时间、决定权、救济方式\n\n讲解：\n回避制度四要素记忆法：①提出时间：开始审理时提出，但知道回避事由的可以在法庭辩论终结前提出；②停止工作：申请后决定前被申请人应暂停工作；③决定权：审判人员（含陪审员）→院长决定；其他人员→审判长决定；④救济：不服可以申请复议一次（不是上诉）。\n\n逐项：\nA ✓ 知道回避事由后可以在法庭辩论终结前提出，时间合法。\nB ✗ 回避决定作出前，被申请人应暂停工作（紧急措施除外），B说\"不停止\"是错的。\nC ✗ 陪审员属于审判人员，回避由院长决定，不是审判长。\nD ✗ 不服回避决定可以申请复议一次，不能提起上诉。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"A市环保组织向A市中院提起公益诉讼，B市环保组织向B市中院也提起公益诉讼。关于本案，表述错误的是？","options":"A. A市中院、B市中院均有权审理各自的案件，分别判决\nB. B市中院应当把案件移送给A市中院\nC. A市环保组织和B市环保组织可做共同原告\nD. 如果对管辖权有争议，可报甲省高院指定管辖","answer":"答案：A","analysis":"考点：公益诉讼的管辖规则与共同原告\n\n讲解：\n同一侵权行为引发的公益诉讼，分别向不同法院起诉的，应由最先立案的法院管辖，不能各管各的。后立案的法院应将案件移送先立案的法院。两个环保组织可以做共同原告。A选项说\"分别判决\"是错误的。\n\n逐项：\nA ✗（选此项） 不能各自判决，应由最先立案的法院统一管辖。\nB ✓ 后立案的B市中院应当把案件移送给先立案的A市中院。\nC ✓ 两个环保组织可以做共同原告。\nD ✓ 管辖权有争议的，可报共同上级法院（甲省高院）指定管辖。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"程某的房子租给陆某，陆某在阳台养花，花盆掉落砸中李某。本案应当以谁为被告？","options":"A. 程某和陆某为共同被告\nB. 程某为被告\nC. 小区物业为被告\nD. 陆某为被告","answer":"答案：A","analysis":"考点：搁置物、悬挂物致人损害的被告确定\n\n讲解：\n《民法典》规定：搁置物、悬挂物脱落坠落造成他人损害，所有人、管理人或使用人不能证明无过错的，应承担侵权责任。程某是房屋所有人，陆某是房屋使用人/管理人，两人都是适格被告，应列为共同被告。\n\n逐项：\nA ✓ 所有人程某和使用人/管理人陆某应为共同被告。\nB ✗ 只列程某不完整。\nC ✗ 物业不是本案的直接责任人。\nD ✗ 只列陆某不完整。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"张弟在赴法院提交上诉状路上被撞昏迷，苏醒时已超过上诉期限一天。下列哪一说法正确？","options":"A. 法律上没有途径可对张弟上诉权予以补救\nB. 因意外事故耽误上诉期限，法院应依职权决定顺延期限\nC. 张弟可在清醒后10日内，申请顺延期限，是否准许，由法院决定\nD. 上诉期限为法定期间，张弟提出顺延期限，法院不应准许","answer":"答案：C","analysis":"考点：期间的耽误与顺延\n\n讲解：\n因不可抗拒的事由（如车祸昏迷）或其他正当理由耽误期限的，在障碍消除后10日内可以申请顺延期限，是否准许由法院决定。注意两点：①需要当事人主动申请（法院不会自动顺延）；②法院有裁量权（\"是否准许\"由法院决定）。\n\n逐项：\nA ✗ 法律提供了救济途径——申请顺延期限。\nB ✗ 顺延需要当事人申请，法院不能依职权决定。\nC ✓ 障碍消除后10日内申请顺延，是否准许由法院决定。完全正确。\nD ✗ 法定期间也可以因正当理由顺延。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"甲向乙借款20万元，丙是担保人。乙向法院申请支付令，甲在法定期间未提出异议，但以借款不成立为由向另一法院提起诉讼。下列哪一说法正确？","options":"A. 甲向另一法院提起诉讼，视为对支付令提出异议\nB. 甲向另一法院提起诉讼，法院应裁定终结督促程序\nC. 甲在法定期间未提出书面异议，不影响支付令效力\nD. 法院发出的支付令，对丙具有拘束力","answer":"答案：C","analysis":"考点：督促程序——支付令的异议与效力\n\n讲解：\n支付令异议必须在收到支付令之日起15日内向作出支付令的法院提出书面异议。甲没在法定期间内提书面异议，而是向其他法院起诉，不影响支付令效力。另外，对债务人发的支付令对担保人没有拘束力。\n\n逐项：\nA ✗ 向其他法院起诉不等于提出异议。\nB ✗ 不需要终结督促程序，支付令已经生效。\nC ✓ 未在法定期间提出书面异议，不影响支付令效力。\nD ✗ 支付令对担保人丙没有拘束力。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"A将B、C起诉到甲县法院，法院判C败诉，以B不适格驳回对B的请求。C上诉认为甲县法院无管辖权（B住所地），在二审中提管辖权异议。二审法院应当如何处理？","options":"A. 移送管辖\nB. 指定管辖\nC. 对管辖权异议不予审查\nD. 撤销原判，发回重审","answer":"答案：C","analysis":"考点：应诉管辖（管辖权异议的提出时间）\n\n讲解：\n管辖权异议必须在一审提交答辩状期间提出。C在一审没提管辖权异议并且应诉答辩了，法院已经取得了应诉管辖权。二审中再提管辖权异议，法院不予审查。口诀：\"一审不提，二审没戏。\"\n\n逐项：\nA ✗ 已经取得应诉管辖权，不需要移送。\nB ✗ 不存在指定管辖的问题。\nC ✓ 一审已取得应诉管辖权，二审对管辖权异议不予审查。\nD ✗ 不存在因管辖权撤销原判的理由。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"蒋某雇佣杨某保洁，杨某不慎将玻璃撞破，碎片划伤楼下张某。张某应当以谁为被告？","options":"A. 应以蒋某作为被告\nB. 应以杨某作为被告\nC. 应以蒋某和杨某作为共同被告\nD. 可以蒋某或杨某作为被告","answer":"答案：A","analysis":"考点：提供劳务致人损害的被告确定（个人劳务关系）\n\n讲解：\n这是个人之间的劳务关系（雇佣关系），杨某是提供劳务方，蒋某是接受劳务方。《民诉法解释》明确规定：提供劳务一方因劳务致人损害的，受害人起诉应以接受劳务方（雇主蒋某）为被告。注意与第24题区别：24题是搁置物坠落，涉及所有人和使用人；本题是雇员工作中致人损害，只找雇主。\n\n逐项：\nA ✓ 按照法律规定，应以接受劳务方（雇主）蒋某为被告。\nB ✗ 杨某是提供劳务方，不是适格被告。\nC ✗ 不需要列共同被告。\nD ✗ 不是选择性的。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"薛某雇杨某料理家务，杨某扔垃圾时袋中碎玻璃划伤乔某。下列哪一说法正确？","options":"A. 乔某应起诉杨某，并承担杨某主观有过错的证明责任\nB. 乔某应起诉杨某，由杨某承担其主观无过错的证明责任\nC. 乔某应起诉薛某，由薛某承担其主观无过错的证明责任\nD. 乔某应起诉薛某，薛某主观是否有过错不是本案的证明对象","answer":"答案：D","analysis":"考点：提供劳务致人损害的被告确定+无过错责任的证明对象\n\n讲解：\n和第28题一样，雇主（接受劳务方）薛某是适格被告。关键区别在于证明责任：个人劳务关系中接受劳务方承担的是无过错责任，所以\"过错\"根本不是本案的构成要件，不需要证明谁有没有过错。乔某只需证明行为、结果和因果关系即可。\n\n逐项：\nA ✗ 不应起诉杨某，应起诉雇主薛某。\nB ✗ 同上，被告错误。\nC ✗ 被告正确（薛某），但薛某承担的是无过错责任，不存在\"证明无过错\"的问题。\nD ✓ 起诉薛某正确，且因为是无过错责任，过错不是本案证明对象。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"李某在张某电商平台购物产生纠纷，管辖协议约定N市B区法院管辖。李某向M市A区法院起诉，A区法院移送至N市B区法院。N市已设互联网法院，N市B区法院如何处理？","options":"A. 报N市中院指定管辖\nB. 逐级报最高院指定管辖\nC. 退回M市A区法院\nD. 将案件移送N市互联网法院","answer":"答案：A","analysis":"考点：互联网法院的集中管辖+移送管辖规则\n\n讲解：\n本案是网络购物纠纷，属于发生在互联网上的合同纠纷，N市有互联网法院，所以应由N市互联网法院管辖。但问题是：A区法院已经将案件移送给了B区法院，而移送管辖只能移送一次——受移送的B区法院不能再次移送，也不能退回，只能报自己的上级法院（N市中院）指定管辖。\n\n逐项：\nA ✓ 受移送法院认为自己没管辖权的，应报上级法院指定管辖。\nB ✗ 不需要逐级报到最高院，报N市中院即可。\nC ✗ 移送管辖只能一次，不能退回。\nD ✗ 不能再次移送（哪怕移给互联网法院也不行）。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"郑某起诉林某，林某提起反诉，后郑某撤诉，法院裁定驳回了林某的反诉。林某上诉，二审法院应当如何处理？","options":"A. 调解，调解不成告知另行起诉\nB. 裁定驳回上诉，维持原裁定\nC. 撤销驳回反诉的裁定，同时发回重审\nD. 撤销原裁定，同时指定原审法院审理","answer":"答案：D","analysis":"考点：反诉的独立性\n\n讲解：\n反诉具有独立性——它是一个独立的诉，不会因为本诉撤诉就自动消灭。郑某撤回本诉后，林某的反诉应当继续审理。一审法院以\"原告撤诉\"为由驳回反诉是错误的。二审应当撤销该错误裁定，指定原审法院继续审理。\n\n逐项：\nA ✗ 不是简单地调解+另诉的问题，而是一审裁定本身就错了。\nB ✗ 一审驳回反诉的裁定是错误的，不能维持。\nC ✗ \"发回重审\"说法不准确。\nD ✓ 二审撤销错误裁定，指定原审法院对反诉继续审理。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"关于法院制作的调解书，下列哪一说法是正确的？","options":"A. 经法院调解，老李和小李维持收养关系，可不制作调解书\nB. 某夫妻解除婚姻关系的调解书生效后，一方以违反自愿为由可申请再审\nC. 检察院对调解书的监督方式只能是提出检察建议\nD. 执行过程中，达成和解协议的，法院可根据当事人的要求制作成调解书","answer":"答案：A","analysis":"考点：调解书的制作规则、再审限制、检察监督\n\n讲解：\n四类情形可以不制作调解书：①调解和好的离婚案件；②调解维持收养关系的案件；③能即时履行的案件；④双方同意签字后生效的案件。解除婚姻关系的判决/调解书生效后不得申请再审（否则会导致重婚）。检察院可以抗诉+检察建议两种方式监督。执行程序中不适用调解。\n\n逐项：\nA ✓ 调解维持收养关系属于可以不制作调解书的法定情形。\nB ✗ 解除婚姻关系的调解书生效后不能申请再审。\nC ✗ 检察院可以通过抗诉和检察建议两种方式监督。\nD ✗ 执行程序中不适用调解制度，当事人可以自行和解但不能制作调解书。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"再审裁定发回重审，重审中法院追加丙公司参加诉讼，乙公司提出反诉，甲公司提出撤诉。关于法院的处理，错误的是？","options":"A. 法院准许乙公司提反诉\nB. 法院应适用普通程序审理\nC. 法院准许甲公司撤诉后，应裁定驳回乙公司的再审申请\nD. 法院准许甲公司撤诉后，法院应就乙公司的反诉进行审理","answer":"答案：C","analysis":"考点：再审发回重审后的程序规则+反诉独立性+撤诉规则\n\n讲解：\n再审裁定撤销原判发回重审后，追加了新当事人→可以增加/变更诉讼请求/提反诉。本诉撤诉→反诉继续审理（反诉独立性）。撤诉后应一并撤销原判，而不是\"驳回再审申请\"。C选项\"裁定驳回乙公司的再审申请\"说法错误。\n\n逐项：\nA ✓ 追加了新当事人，符合再审发回重审后允许提反诉的条件。\nB ✓ 发回重审后应另行组成合议庭适用一审普通程序审理。\nC ✗（选此项） 撤诉后应\"一并裁定撤销原判\"，不是\"驳回再审申请\"。\nD ✓ 反诉具有独立性，本诉撤诉后反诉继续审理。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"艾某将与贾某的电话录音（私下偷录并剪辑）提交法院。关于本案证据认定，正确的是？","options":"A. 电话录音没有经过对方同意，不能作为证据使用\nB. 电话录音虽然没有经过对方同意，依然可以作为证据使用\nC. 电话录音经过了剪辑，存有疑点，不能作为证据使用\nD. 贾某对借款事实的承认构成了自认","answer":"答案：B","analysis":"考点：非法证据排除规则+存有疑点的视听资料+自认的场合\n\n讲解：\n关键区分：偷录≠非法取证。只有以\"严重侵害他人合法权益、违反法律禁止性规定或严重违背公序良俗\"的方式取得的证据才被排除。普通的私下录音并不属于非法取证。剪辑后的录音有疑点→不能单独定案，但不是完全不能用。电话中的承认不在\"法庭审理中\"，不构成自认。\n\n逐项：\nA ✗ 未经同意的偷录不属于非法证据排除的范围，仍可作为证据使用。\nB ✓ 偷录但未严重侵害他人权益的录音可以作为证据使用。\nC ✗ 剪辑后的录音有疑点，不能单独定案，但仍然可以作为证据使用（证明力减弱≠不能使用）。\nD ✗ 电话中的承认不是在法庭审理中或法定书面材料中作出的，不构成自认。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"小额诉讼程序审理，法院确定了7天答辩期，指定5天举证期限，告知被告小额诉讼程序不能提管辖权异议。法院做法错误的是？","options":"A. 法院决定适用小额诉讼程序审理该案\nB. 法院确定了7天的答辩期\nC. 法院指定的5天举证期限\nD. 法院告知其小额诉讼程序不能提管辖权异议","answer":"答案：D","analysis":"考点：小额诉讼程序的特殊规则\n\n讲解：\n小额诉讼程序的特殊规定：举证期限一般不超过7日；答辩期最长不超过15日；可以提管辖权异议（裁定一经作出即生效，一审终审）。D说\"不能提管辖权异议\"是错误的——可以提，只是裁定一经作出即生效。\n\n逐项：\nA ✓ 标的额1000元，符合小额诉讼程序条件。\nB ✓ 小额诉讼答辩期最长不超过15日，7天合法。\nC ✓ 小额诉讼举证期限一般不超过7日，5天合法。\nD ✗（选此项） 小额诉讼可以提管辖权异议，只是裁定一经作出即生效。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"丁一诉丁二继承纠纷，丁爽以有独三身份参诉，提供遗嘱主张权利。丁一撤诉后，在程序上正确的是？","options":"A. 丁爽为另案原告，丁二为另案被告\nB. 丁爽为另案原告，丁一、丁二为另案被告\nC. 丁一、丁爽为另案原告，丁二为另案被告\nD. 丁爽、丁二为另案原告，丁一为另案被告","answer":"答案：B","analysis":"考点：有独立请求权第三人参诉后本诉撤诉的处理\n\n讲解：\n丁爽基于遗嘱继承（独立法律关系）主张所有遗产归自己，对丁一和丁二都有对立的利益主张。有独三之诉中，有独三（丁爽）是原告，原审双方（丁一、丁二）都是被告。丁一作为本诉原告撤回本诉后，有独三之诉独立存在，继续进行，丁爽为原告，丁一和丁二均为被告。\n\n逐项：\nA ✗ 丁爽的权利主张也涉及丁一（丁爽要全部遗产，丁一也有继承权），丁一也应为被告。\nB ✓ 丁爽为原告，丁一、丁二均为被告，诉讼继续进行。\nC ✗ 丁一已撤回本诉，不能作为有独三之诉的原告。\nD ✗ 当事人地位错误。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"乙公司诉至D县法院，甲公司提交了答辩状。判决后甲公司以D县法院无管辖权为由上诉。下列哪一表述正确？","options":"A. D县法院有管辖权\nB. 二审法院对上诉人提出的管辖权异议不予审查，裁定驳回异议\nC. 二审法院应裁定撤销一审判决，发回重审\nD. 二审法院应裁定撤销一审判决，移送有管辖权法院","answer":"答案：B","analysis":"考点：应诉管辖——答辩状期间不提异议的法律后果\n\n讲解：\n甲公司在一审提交答辩状期间没提管辖权异议，并且应诉答辩了→法院取得应诉管辖权。此后再提管辖权异议就\"太迟了\"。二审法院不需要审查，直接裁定驳回异议。\n\n逐项：\nA ✗ D县法院原本可能没有管辖权（合同未履行+约定履行地非双方住所地），但已取得应诉管辖权。\nB ✓ 一审已取得应诉管辖权，二审对管辖权异议不予审查。\nC ✗ 不存在撤销原判的理由。\nD ✗ 不需要移送管辖。","flagMemory":true,"level":0,"seen":0},{"chapter":"单选","question":"杨青（15岁）将何翔（14岁）推成植物人，何翔弟弟何军（11岁）以证人身份出庭。关于何军作证，下列哪个说法成立？","options":"A. 何军11岁无诉讼行为能力，不具有证人资格\nB. 何军是何翔弟弟，应回避\nC. 何军未成年人，其所有证言不具有证明力\nD. 何军作为何翔弟弟，证言有倾向性，不能单独作为认定事实的根据","answer":"答案：D","analysis":"考点：证人资格+证人不适用回避+利害关系证人的证明力\n\n讲解：\n证人资格取决于\"待证事实与其年龄、智力状况是否相适应\"，11岁的何军亲眼看到打架过程，与其年龄智力相适应，可以作证。证人具有不可替代性，不适用回避制度。但何军与当事人有利害关系（亲属），其证言有倾向性，不能单独定案，需要其他证据补强。\n\n逐项：\nA ✗ 待证事实与其年龄智力相适应的未成年人可以作证。\nB ✗ 证人不适用回避制度（证人具有不可替代性）。\nC ✗ 未成年人的证言不是完全没有证明力，只是可能受限制。\nD ✓ 与当事人有利害关系的证人证言，不能单独定案，需要补强。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"成某诉罗某借款纠纷案审理中，成某所乘航班失踪，成妻向乙县法院申请宣告成某死亡。甲县法院对借款案如何处理？","options":"A. 乙县法院应将宣告死亡案移送至甲县法院\nB. 两案应当合并审理\nC. 甲县法院应当裁定中止诉讼\nD. 甲县法院应当裁定终结诉讼","answer":"答案：C","analysis":"考点：诉讼中止的情形——以其他案件审理结果为前提\n\n讲解：\n借款案能不能继续审，取决于成某是否被宣告死亡——如果宣告死亡了，成某的继承人来继续诉讼。也就是说，借款案需要以宣告死亡案的结果为前提，应当中止诉讼等待结果。不是终结，因为借款债权可以继承。\n\n逐项：\nA ✗ 宣告死亡案和借款案是不同程序，不需要移送。\nB ✗ 两个案件性质不同（特别程序vs普通程序），不能合并审理。\nC ✓ 需要以宣告死亡案的结果为依据，应裁定中止诉讼。\nD ✗ 借款债权可以继承，不应终结诉讼。","flagMemory":false,"level":0,"seen":0},{"chapter":"单选","question":"齐远、张红离婚诉讼，一审判决准予离婚，齐远上诉。二审中张红增加分割遗产请求。一审漏判住房分割。下列哪一说法正确？","options":"A. 一审漏判的住房分割诉讼请求，二审可调解，调解不成，发回重审\nB. 二审增加的遗产分割诉讼请求，二审可调解，调解不成，发回重审\nC. 两个诉讼请求可合并调解，也可一并发回重审\nD. 经当事人同意，二审法院可一并裁判","answer":"答案：A","analysis":"考点：二审对一审遗漏诉讼请求和二审新增诉讼请求的不同处理\n\n讲解：\n这道题的关键是区分两种情况：①一审遗漏的住房分割→二审可调解，调解不成撤销原判发回重审；②二审新增的遗产分割→二审可调解，调解不成告知另行起诉（经当事人同意可以一并审理）。两者处理方式不同，不能混为一谈。\n\n逐项：\nA ✓ 一审遗漏诉讼请求→调解，调解不成→撤销原判发回重审。完全正确。\nB ✗ 二审新增的请求调解不成应\"告知另行起诉\"（经同意可一并审理），不是\"发回重审\"。\nC ✗ 两种情况处理方式不同，不能一并发回重审。\nD ✗ \"经当事人同意一并裁判\"只适用于二审新增请求，不适用于一审遗漏请求。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"A区张某和B区甲公司在C区签租赁合同，约定租赁D区公寓，约定C区法院管辖。法院适用小额诉讼程序审理。张某认为D区法院专属管辖，提管辖权异议被驳回。关于本案表述正确的是？","options":"A. 张某对驳回管辖权异议的裁定可以提起上诉\nB. 张某对驳回管辖权异议的裁定不能上诉\nC. 张某对本案生效判决可以向C区法院申请再审\nD. 张某对本案生效判决可以向中院申请再审","answer":"答案：BC","analysis":"考点：小额诉讼程序的一审终审效力+再审管辖\n\n讲解：\n小额诉讼一审终审：不仅判决一审终审，管辖权异议裁定也一审终审，不能上诉。申请再审应向原审法院提出。\n\n逐项：\nA ✗ 小额诉讼的管辖权异议裁定一经作出即生效，不能上诉。\nB ✓ 小额诉讼中的裁定一审终审，不能上诉。\nC ✓ 小额诉讼生效判决申请再审应向原审法院（C区法院）提出。\nD ✗ 不是向中院申请再审，而是向原审法院。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"下列属于民事诉讼当事人的有","options":"A. 原告\nB. 被告\nC. 共同诉讼人\nD. 诉讼代表人","answer":"答案：ABCD","analysis":"考点：当事人的概念和范围\n\n讲解：\n广义的当事人包括：原告、被告、共同诉讼人、诉讼代表人、第三人等。四个选项都属于民事诉讼当事人。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"张三诉李四归还借款6万元，双方同意适用小额诉讼程序。审理中李四反诉要求张三归还8万元。下列正确的是？","options":"A. 法院应当继续适用小额诉讼程序审理\nB. 如张三、李四同意，法院应当适用小额诉讼程序审理\nC. 当事人可以对法院适用小额诉讼程序审理提出异议\nD. 法院应当适用简易程序的其他规定审理或者裁定将案件转为普通程序","answer":"答案：CD","analysis":"考点：小额诉讼程序的排除适用情形——反诉\n\n讲解：\n当事人提出反诉的案件不得适用小额诉讼程序（法定禁止情形）。李四提出反诉后，即使双方同意也不能继续用小额诉讼，应转为简易程序或普通程序。\n\n逐项：\nA ✗ 提出反诉后不能继续适用小额诉讼程序。\nB ✗ 反诉是小额诉讼的法定禁止情形，当事人同意也不行。\nC ✓ 当事人可以对适用小额诉讼程序提出异议。\nD ✓ 应转为简易程序或普通程序。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"下列关于管辖的表述，正确的有","options":"A. 因合同纠纷提起的诉讼，由被告住所地或者合同履行地人民法院管辖\nB. 因侵权行为提起的诉讼，由侵权行为地或者被告住所地人民法院管辖\nC. 两个以上法院都有管辖权的，原告可以向其中一个法院起诉\nD. 法院发现受理的案件不属于本院管辖的，应当移送有管辖权的法院","answer":"答案：ABCD","analysis":"考点：管辖基本规则","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"甲起诉乙归还借款200元，某区法院适用小额诉讼程序审理。关于本案，正确的是？","options":"A. 法院可以采用短信方式传唤当事人\nB. 法院可以采用短信送达裁判文书\nC. 本案不得适用小额诉讼程序审理\nD. 本案法院所作判决一审终审","answer":"答案：ABD","analysis":"考点：小额诉讼程序的简便送达方式\n\n讲解：\n小额诉讼属于简易程序的特殊形式，可以用简便方式（短信、电话、传真等）传唤当事人和送达诉讼文书（包括裁判文书）。一审终审。\n\n逐项：\nA ✓ 可以用短信等简便方式传唤。\nB ✓ 小额诉讼可以用简便方式送达裁判文书。\nC ✗ 200元标的额完全符合小额诉讼条件。\nD ✓ 小额诉讼一审终审。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"下列属于民事诉讼证据种类的有","options":"A. 书证\nB. 物证\nC. 视听资料\nD. 电子数据","answer":"答案：ABCD","analysis":"考点：民事诉讼证据的法定种类（八种）","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"外国人汤姆在互联网法院起诉杨某因衬衫质量纠纷（500元），互联网法院受理。关于审理，正确的是？","options":"A. 本案可以适用小额诉讼程序审理\nB. 本案法院可以决定线下审理\nC. 经当事人同意后可以通过电子方式送达判决书\nD. 本案可以适用独任制审理","answer":"答案：BCD","analysis":"考点：互联网法院审理规则+涉外案件的小额诉讼限制\n\n讲解：\n本案是涉外案件，涉外案件不能适用小额诉讼程序，所以A错。互联网法院原则上线上审理，但特殊情形可以线下开庭。经当事人同意可以电子送达判决书。\n\n逐项：\nA ✗ 涉外民事案件不得适用小额诉讼程序。\nB ✓ 互联网法院特殊情形下可以线下开庭。\nC ✓ 经当事人同意可以电子送达判决书。\nD ✓ 不存在禁止独任的情形，可以适用独任制。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"下列关于保全的表述，正确的有","options":"A. 法院根据当事人申请可以裁定财产保全、责令作出或禁止一定行为\nB. 利害关系人可以在诉前向被保全财产所在地等法院申请保全\nC. 财产保全采取查封、扣押、冻结或其他法定方法\nD. 申请有错误的，申请人应当赔偿被申请人因保全所遭受的损失","answer":"答案：ABCD","analysis":"考点：保全制度（诉讼保全、诉前保全）","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"下列关于特别程序的表述，正确的有","options":"A. 特别程序实行一审终审\nB. 特别程序不适用辩论原则\nC. 除选民资格案件或重大疑难案件由审判员组成合议庭审理外，其他案件独任审理\nD. 应当在立案之日起三十日内或公告期满后三十日内审结","answer":"答案：ABCD","analysis":"考点：特别程序的基本特征","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"金某（外国人）和全某（外国人）在中国长期居住，全某被曹某打伤起诉要求赔偿。下列正确的是？","options":"A. 全某可委托金某担任诉讼代理人\nB. 法院可发送中文和外文判决书，并加盖法院印章\nC. 法院可不提供中文翻译\nD. 本案由中院审理","answer":"答案：AC","analysis":"考点：涉外民事诉讼的语言文字规则+代理+管辖\n\n讲解：\n涉外民事诉讼：①外国人可以担任代理人（禁止的只是外国律师以律师身份代理）；②法院用中文，外文翻译判决书不得加盖法院印章；③当事人要求翻译的可以提供（不是必须），费用自理；④普通涉外案件基层法院管辖，重大涉外案件才由中院管辖。\n\n逐项：\nA ✓ 外国人可以担任诉讼代理人。\nB ✗ 外文判决书不得加盖法院印章。\nC ✓ 当事人没要求翻译的，法院可以不提供。\nD ✗ 普通涉外案件由基层法院管辖。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"再审期间甲公司要求增加违约金，乙公司主张解除合同，法院应当如何处理？","options":"A. 对于增加违约金，法院应调解处理\nB. 对于解除合同，法院应调解处理\nC. 对于增加违约金，法院告知当事人另行起诉\nD. 对于解除合同，法院告知当事人另行起诉","answer":"答案：CD","analysis":"考点：再审范围有限原则\n\n讲解：\n再审以原审范围为限。超出原审范围的新增请求（原告增加的违约金请求、被告提出的解除合同反诉请求）不属于再审范围，法院不予审理，告知当事人另行起诉，不组织调解。\n\n逐项：\nA ✗ 再审中不能对超出原审范围的新请求组织调解。\nB ✗ 同上。\nC ✓ 增加违约金超出原审范围，告知另行起诉。\nD ✓ 解除合同是反诉请求，超出原审范围，告知另行起诉。","flagMemory":true,"level":0,"seen":0},{"chapter":"多选","question":"甲对乙申请支付令，又将担保人丙诉至法院。关于本案，正确的是？","options":"A. 法院受理甲的起诉，则支付令失效\nB. 法院受理甲的起诉，则支付令效力中止\nC. 支付令对担保人丙也有拘束力\nD. 支付令对担保人丙没有拘束力","answer":"答案：AD","analysis":"考点：支付令的效力范围+对担保人的效力\n\n讲解：\n支付令只对债务人发出，对担保人没有拘束力。甲起诉丙，意味着就同一债务关系向法院提起了诉讼，此时支付令失效。\n\n逐项：\nA ✓ 就同一债权债务关系提起诉讼的，支付令失效。\nB ✗ 不是\"效力中止\"，而是\"失效\"。\nC ✗ 支付令对担保人没有拘束力。\nD ✓ 支付令对担保人没有拘束力。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"梁某未履行判决，法院查封其名下房产，梁父老梁提出异议称房产是自己的。以下说法正确的是？","options":"A. 老梁可以直接向法院提起异议之诉\nB. 在法院审查老梁异议期间，执行法院对该房产可以继续执行\nC. 如果法院裁定老梁异议成立，则应当终结对该房产的执行\nD. 如果法院裁定驳回老梁异议，老梁可以曲某作为被告提起执行异议之诉","answer":"答案：BD","analysis":"考点：案外人执行异议与执行异议之诉\n\n讲解：\n案外人执行异议的流程：案外人先向执行法院提出异议→法院审查裁定→不服裁定的再提起异议之诉。不能跳过异议直接起诉（A错）。异议成立→裁定中止执行（不是终结，C错）。异议被驳回→案外人可以提起案外人异议之诉。\n\n逐项：\nA ✗ 必须先提出异议，不能直接提起异议之诉。\nB ✓ 审查异议期间执行不停止（除非裁定中止）。\nC ✗ 异议成立应裁定中止执行，不是终结。\nD ✓ 异议被驳回后，老梁可以提起案外人异议之诉。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"程某诉刘某借款中，程某将债权转让给谢某。下列哪些选项正确？","options":"A. 如程某撤诉，法院可以准许\nB. 谢某可以申请以无独立请求权第三人身份参加诉讼\nC. 谢某申请替代程某诉讼地位的，法院可根据情况决定是否准许\nD. 如法院不予准许谢某替代，可追加谢某为无独立请求权第三人","answer":"答案：ABCD","analysis":"考点：诉讼中债权转让的处理","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"田某拒不迁出钟某房屋。法院对田某可以采取的强制执行措施，正确的有？","options":"A. 罚款\nB. 责令田某向钟某赔礼道歉\nC. 责令田某双倍补偿钟某所受到的损失\nD. 责令田某加倍支付以钟某所受损失为基数的同期银行利息","answer":"答案：AC","analysis":"考点：迟延履行的强制执行措施\n\n讲解：\n对拒不执行判决的人，法院可以罚款、拘留，还可以责令双倍补偿因迟延履行造成的损失。赔礼道歉是判决内容，不是强制执行措施。加倍支付利息适用的是金钱给付义务，不是迁出房屋这种行为义务。\n\n逐项：\nA ✓ 罚款是法定强制执行措施。\nB ✗ 赔礼道歉不是执行措施。\nC ✓ 迟延履行非金钱义务的，可以责令双倍补偿损失。\nD ✗ 加倍支付利息适用于迟延履行金钱给付义务。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"朱某得知人民陪审员唐某违反规定私下会见孙某的代理律师，提出回避申请。关于回避，正确的有？","options":"A. 唐某有权就回避决定申请复议\nB. 朱某申请回避时，必须说明理由\nC. 唐某的回避应由法院院长决定\nD. 朱某应向法院院长提出针对唐某的回避申请","answer":"答案：BC","analysis":"考点：回避制度的细节——理由说明、决定权、复议权、申请对象\n\n讲解：\n申请回避必须说明理由。人民陪审员属于审判人员，回避由院长决定。复议权属于申请人（当事人朱某），不属于被申请回避的人（唐某）。回避申请向法院提出，不是直接向院长提出。\n\n逐项：\nA ✗ 复议权属于申请人（朱某），不属于唐某。\nB ✓ 申请回避时必须说明理由。\nC ✓ 陪审员属于审判人员，回避由院长决定。\nD ✗ 回避申请向法院提出，由院长决定，不是\"向院长提出\"。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"范晓明闯红灯撞伤谢丽，谢丽可以向法院申请采取下列哪些措施？","options":"A. 申请对范某采取强制措施\nB. 申请公开审理\nC. 申请先予执行\nD. 申请财产保全","answer":"答案：CD","analysis":"考点：先予执行与财产保全的申请条件\n\n讲解：\n谢丽住院治疗急需医疗费→可以申请先予执行（追索医疗费属于法定先予执行情形）。担心范某转移财产→可以申请财产保全。强制措施是法院对妨害诉讼行为采取的，不是当事人可以申请的。公开审理是原则，不需要申请。\n\n逐项：\nA ✗ 强制措施由法院依职权采取，当事人不能申请。\nB ✗ 公开审理是原则，不需要申请。\nC ✓ 追索医疗费属于法定先予执行范围。\nD ✓ 可以申请财产保全防止转移财产。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"薛某雇杨某料理家务，杨某扔垃圾划伤乔某。下列哪些说法是错误的？","options":"A. 乔某应起诉杨某，承担杨某有过错的证明责任\nB. 乔某应起诉杨某，由杨某承担无过错的证明责任\nC. 乔某应起诉薛某，由薛某承担无过错的证明责任\nD. 乔某应起诉薛某，薛某是否有过错不是本案证明对象","answer":"答案：ABC","analysis":"考点：提供劳务致人损害——被告确定+无过错责任\n\n讲解：\n正确做法（D选项）：起诉雇主薛某，且因为是无过错责任，过错不是证明对象。A、B被告选错了（应起诉薛某不是杨某），C被告对了但证明责任错了（无过错责任不需要证明过错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"民诉法规定，可以成为诉讼代理人的是","options":"A. 律师\nB. 法律服务所所长\nC. 工会推荐的人\nD. 当事人的妻子","answer":"答案：ABCD","analysis":"考点：诉讼代理人的范围\n\n讲解：\n可以担任诉讼代理人的包括：律师、基层法律服务工作者、当事人近亲属或工作人员、当事人所在社区/单位推荐的人、有关社会团体推荐的人。四项都符合。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"人民法院审理（　）时，法律规定应当不公开进行。","options":"A. 离婚案件\nB. 涉及国家秘密的民事案件\nC. 涉及商业秘密的民事案件\nD. 涉及个人隐私的民事案件","answer":"答案：BD","analysis":"考点：不公开审理的两种类型——法定不公开 vs 申请不公开\n\n讲解：\n不公开审理分两类：\n① 法定应当不公开（法院必须主动不公开）：涉及国家秘密、涉及个人隐私\n② 当事人申请可以不公开（需要当事人申请）：离婚案件、涉及商业秘密\n\n题目问\"法律规定应当不公开进行\"的，只有BD。离婚案件和涉及商业秘密的案件是\"可以不公开\"（需当事人申请），不是\"应当\"。\n\n逐项：\nA ✗ 离婚案件需要当事人申请才可以不公开，不是\"应当不公开\"。\nB ✓ 涉及国家秘密的必须不公开审理。\nC ✗ 涉及商业秘密需要当事人申请才可以不公开。\nD ✓ 涉及个人隐私的必须不公开审理。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"下列哪些案件不适用小额诉讼程序？","options":"A. 人身关系案件\nB. 涉外民事案件\nC. 海事案件\nD. 发回重审的案件","answer":"答案：ABD","analysis":"考点：小额诉讼程序的排除适用\n\n讲解：\n不得适用小额诉讼的情形：人身关系、财产确权、涉外案件、需要鉴定的、一方下落不明的、反诉案件、发回重审案件等。注意：海事案件可以适用小额诉讼（海事法院符合条件的可以适用）。\n\n逐项：\nA ✓ 人身关系案件不适用小额诉讼。\nB ✓ 涉外案件不适用小额诉讼。\nC ✗ 海事案件符合条件的可以适用小额诉讼。\nD ✓ 发回重审不适用简易程序，自然不适用小额诉讼。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"陪审员乔某是被告表弟，刘某申请回避被审判长当场拒绝。刘某上诉。下列说法错误的是？","options":"A. 刘某申请回避理由成立\nB. 乔某作为人民陪审员，其回避审判长有权决定\nC. 对法院决定不服的，刘某可以提出上诉\nD. 发回重审后应当组成新合议庭，合议庭中不得有人民陪审员","answer":"答案：BCD","analysis":"考点：回避决定权+回避救济+发回重审的合议庭\n\n讲解：\nA正确（陪审员是被告表弟→应回避）。B错（陪审员属于审判人员→由院长决定，不是审判长）。C错（不服回避决定→申请复议，不是上诉）。D错（发回重审组新合议庭，但可以有人民陪审员）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"叶某诉汪某借款纠纷案，涉及借条复印件、证人证言和文书提出命令。下列哪些选项正确？","options":"A. 法院可根据借条复印件结合刘某证言审查判断\nB. 借条复印件是传来证据\nC. 法院可认定汪某向叶某借款3万元的事实\nD. 法院可对汪某进行罚款、拘留","answer":"答案：ABCD","analysis":"考点：最佳证据规则+文书提出命令+妨害证据的后果\n\n讲解：\n书证原件在对方控制下→可以申请法院责令对方提交→拒不提交→法院可认定对方主张的事实为真实。故意毁灭书证的→可以罚款、拘留。四项均正确。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"案外人谢某异议成立，法院裁定中止执行。关于异议之诉，下列哪些选项错误？","options":"A. 易某提起异议之诉，由易某承担对谢某不享有所有权的证明责任\nB. 易某提起异议之诉，由谢某承担对其享有所有权的证明责任\nC. 王某提起异议之诉，由王某承担对谢某不享有所有权的证明责任\nD. 王某提起异议之诉，由王某承担对其享有所有权的证明责任","answer":"答案：ACD","analysis":"考点：执行异议之诉的证明责任\n\n讲解：\n执行异议之诉的证明责任：无论是许可执行之诉还是案外人异议之诉，都应当由案外人对执行标的享有足以阻碍执行的权利承担证明责任。所以应由谢某证明其享有所有权（B正确），其他选项的证明责任分配均错误。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"双方约定适用简易程序，法院以电子邮件通知开庭（未回复），缺席判决，公告送达判决书。下列哪些行为合法？","options":"A. 同意双方约定适用简易程序\nB. 以电子邮件方式通知开庭时间\nC. 作出缺席判决\nD. 采取公告方式送达判决书","answer":"答案：AB","analysis":"考点：简易程序的送达方式+缺席判决的限制+公告送达\n\n讲解：\n简便方式送达的开庭通知，未经当事人确认收到的→不得缺席判决（C错）。简易程序不允许公告送达（D错）。约定适用简易程序和电子邮件通知开庭的做法本身合法（AB对）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"二审中三方达成和解协议后赵某撤回上诉。一个月后赵某反悔不履行。关于王某实现债权，下列哪些选项错误？","options":"A. 依和解协议对赵某申请强制执行\nB. 依和解协议对赵某、李某申请强制执行\nC. 依一审判决对赵某申请强制执行\nD. 依一审判决与和解协议对赵某、李某申请强制执行","answer":"答案：ABD","analysis":"考点：撤回上诉的法律效果+和解协议的执行力\n\n讲解：\n赵某撤回上诉→一审判决生效。和解协议没有强制执行力，不能据此申请强制执行。王某只能依据生效的一审判决对赵某申请强制执行。\n\n逐项：\nA ✗ 和解协议没有强制执行力。\nB ✗ 同上。\nC ✓ 一审判决已生效，可以据此申请强制执行。\nD ✗ 和解协议没有强制执行力。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"再审期间元丰公司要求增加违约金，神木公司主张解除合同。法院下列处理错误的是？","options":"A. 对于增加违约金，法院应调解处理\nB. 对于解除合同，法院应调解处理\nC. 对于增加违约金，法院告知另诉\nD. 对于解除合同，法院告知另诉","answer":"答案：AB","analysis":"考点：再审范围有限原则（与多选第11题考点相同）\n\n讲解：\n同第11题：再审以原审范围为限，新增请求不属于再审范围，告知另行起诉即可，不能组织调解。","flagMemory":true,"level":0,"seen":0},{"chapter":"多选","question":"甲公司拟申请诉前禁令，关于诉前保全，正确的有？","options":"A. 可向有管辖权的法院申请保全，应提供担保\nB. 可向被申请人住所地法院申请，须48小时内作出裁定\nC. 可向有管辖权的法院申请，应当30天内起诉\nD. 如未在规定期限内起诉，保全措施自动解除","answer":"答案：ABC","analysis":"考点：诉前保全的申请条件\n\n讲解：\n诉前保全：①管辖法院：被保全财产所在地/被申请人住所地/有管辖权的法院；②必须提供担保；③48小时内作出裁定；④30日内起诉或申请仲裁，否则法院裁定解除（不是\"自动解除\"，D错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"简易程序审理后发回重审，法院征得同意后用简易程序重审，不予审查管辖权异议，受理增加诉讼请求，拒绝受理反诉。下列哪些做法错误？","options":"A. 征得同意后适用简易程序重审\nB. 对管辖权异议不予审查\nC. 受理增加的诉讼请求\nD. 拒绝受理反诉","answer":"答案：AD","analysis":"考点：发回重审的程序规则\n\n讲解：\n发回重审不得适用简易程序（A错）。发回重审后管辖权异议不予审查（B对）。可以增加诉讼请求（C对）。可以提出反诉，拒绝受理反诉错误（D错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"甲公司丢失汇票申请公示催告，公示催告期间转让汇票给乙企业。期满无人申报，法院组成合议庭判决汇票无效。下列正确的有？","options":"A. A银行应停止支付直至程序终结\nB. 甲公司转让汇票的行为有效\nC. 甲公司未提出申请，法院可以作出除权判决\nD. 判决宣告汇票无效应当组成合议庭","answer":"答案：AD","analysis":"考点：公示催告程序——止付通知、票据转让效力、除权判决\n\n讲解：\n公示催告期间票据转让无效（B错）。除权判决需要申请人申请，法院不能主动作出（C错）。A银行应停止支付（A对）。除权判决阶段应用合议庭（D对）。","flagMemory":true,"level":0,"seen":0},{"chapter":"多选","question":"甲上诉认为丙赔偿2000元过低。关于二审当事人诉讼地位，下列哪些错误？","options":"A. 甲为上诉人，丙为被上诉人，乙为原审被告，丁为原审原告\nB. 甲为上诉人，丙、丁为被上诉人，乙为原审被告\nC. 甲、乙为上诉人，丙为被上诉人，丁为原审原告\nD. 甲、乙、丙为上诉人，丁为被上诉人","answer":"答案：BCD","analysis":"考点：二审中当事人诉讼地位的确定\n\n讲解：\n甲上诉要求增加丙的赔偿→甲是上诉人，丙是被上诉人（改判对丙不利）。对乙、丁无不利影响→按原审地位列明。所以A正确，BCD都错。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"日本法院判决书在中国诉讼中作为证据。关于该判决书的说法，错误的是？","options":"A. 该判决书是书证\nB. 该判决书是鉴定意见\nC. 该判决书所认定的事实属于免证事实\nD. 该判决书不符合法定形式，不能作为证据使用","answer":"答案：ABC","analysis":"考点：域外形成的公文书证+免证事实\n\n讲解：\n日本法院判决书性质上是书证（但A选项虽正确但本题实际是说它未经认证手续，不符合法定形式，所以不能直接作为证据使用——D正确）。它不是鉴定意见（B错）。只有我国法院判决认定的事实才是免证事实，外国法院不是（C错）。域外公文书证需经过认证手续，未经认证不符合法定形式（D正确）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"张老太买理财亏损起诉银行，银行提供有签名的合同原件。关于本案表述错误的是？","options":"A. 银行提供的合同原件是间接证据\nB. 银行提供合同原件后，行为意义上的举证责任转移给张老太\nC. 张老太应将主张的事实证明到排除合理怀疑的标准\nD. 张老太应将主张的事实证明到高度可能性标准","answer":"答案：AD","analysis":"考点：直接证据/间接证据+证明责任转移+证明标准\n\n讲解：\n合同原件能完整证明双方权利义务→直接证据（A错，说间接证据）。银行提供合同后，张老太主张欺诈需自己举证→举证责任转移（B对）。主张欺诈适用排除合理怀疑标准（C对），不是高度可能性（D错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"张男诉刘女离婚，刘女无行为能力，其母李某代诉。7月3日判决离婚，7月10日刘女身亡。本案将产生哪些法律后果？","options":"A. 诉讼中止\nB. 诉讼终结\nC. 一审判决生效，婚姻关系解除，李某继承分配给刘女的财产\nD. 一审判决未生效，共有财产依法分割，张男与李某对刘女遗产均有继承权","answer":"答案：BD","analysis":"考点：上诉期内当事人死亡的法律后果\n\n讲解：\n7月3日判决→7月10日死亡→上诉期15日还没满→一审判决未生效。判决未生效→婚姻关系未解除→刘女在婚姻存续期间死亡→张男和李某（刘女母亲）都是刘女的继承人。离婚诉讼中一方死亡→诉讼终结。","flagMemory":true,"level":0,"seen":0},{"chapter":"多选","question":"张某诉李某侵权，一审判赔1.2万元但漏判赔礼道歉。张某上诉要求改判2万元。二审维持1.2万，同时判决李某赔礼道歉。关于本案表述正确的是？","options":"A. 二审法院只能对上诉请求进行审理并作出判决\nB. 二审法院超出上诉请求作出判决的做法错误\nC. 二审法院应对上诉请求作出判决，对一审遗漏的请求调解，调解不成撤销原判发回重审\nD. 因一审法院遗漏诉讼请求，二审法院应当直接撤销原判发回重审","answer":"答案：ABC","analysis":"考点：二审的审理范围+一审遗漏诉讼请求的处理\n\n讲解：\n二审以上诉请求为限。赔礼道歉未被上诉→不属于二审范围→二审不能直接判决。一审遗漏的诉讼请求→调解，调解不成→撤销原判发回重审（不是直接发回）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"单某申请支付令，卢某拒绝签收，法院留置送达。20天后卢某向N法院起诉。下列哪些选项错误？","options":"A. 卢某拒绝签收支付令，法院留置送达正确\nB. 单某可以依支付令向法院申请强制执行\nC. 因卢某向N法院起诉，支付令当然失效\nD. 因卢某向N法院起诉，法院应裁定终结督促程序","answer":"答案：CD","analysis":"考点：支付令的送达+异议期满后的效力\n\n讲解：\n支付令可以留置送达（A对）。卢某收到支付令20天后才起诉，已超过15日异议期→未在异议期提书面异议→支付令生效→单某可申请执行（B对）。向其他法院起诉不影响支付令效力（CD错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"基层法院审理2900万标的额诉讼，原告增加290万诉讼请求。关于本案表述错误的是？","options":"A. 基层法院已取得应诉管辖，应继续审理\nB. 基层法院应将案件移送中院审理\nC. 被告有权对本案提出管辖权异议\nD. 基于管辖权恒定原则，基层法院应继续审理","answer":"答案：AD","analysis":"考点：级别管辖+管辖权恒定的例外\n\n讲解：\n增加诉讼请求后标的额超过3000万→超出基层法院级别管辖标准。应诉管辖和管辖权恒定原则排除违反级别管辖和专属管辖的情形，所以基层法院不能继续审理（AD错）。被告可以提管辖权异议，法院应移送中院（BC对）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"丙公司提起第三人撤销之诉，检察院抗诉后中级法院再审，B县法院裁定将撤销诉讼并入再审。关于中级法院对丙公司诉讼请求的处理，错误的是？","options":"A. 将丙公司请求一并审理，作出判决\nB. 调解，调解不成告知丙公司另行起诉\nC. 调解，调解不成撤销原判发回重审\nD. 调解，调解不成恢复第三人撤销诉讼程序","answer":"答案：ABD","analysis":"考点：第三人撤销之诉与再审的关系\n\n讲解：\n第三人撤销之诉并入再审后，适用二审程序再审的→调解，调解不成→撤销原判发回重审（C正确）。不是直接一并判决（A错），不是另行起诉（B错），不是恢复撤销诉讼程序（D错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"小额诉讼判决后谭某以标的额超出为由申请再审，法院裁定再审。关于再审程序，下列哪些错误？","options":"A. 谭某应当向中级法院申请再审\nB. 法院应当组成合议庭审理\nC. 对作出的再审判决当事人可以上诉\nD. 作出的再审判决仍实行一审终审","answer":"答案：AD","analysis":"考点：小额诉讼再审的管辖和程序\n\n讲解：\n小额诉讼申请再审→向原审法院提出（不是中院，A错）。再审必须组成合议庭（B对）。以\"不应按小额诉讼审理\"为由申请再审的→不再适用一审终审→可以上诉（C对，D错）。","flagMemory":false,"level":0,"seen":0},{"chapter":"多选","question":"李某申请宣告刘某失踪，法院指定刘妻为财产代管人。刘父要求变更代管人。关于程序，下列哪些说法错误？","options":"A. 李某无权申请刘某失踪\nB. 刘父应提起诉讼变更，法院适用普通程序审理\nC. 刘父应向法院申请变更，法院适用特别程序审理\nD. 刘父应向法院申请再审变更","answer":"答案：ACD","analysis":"考点：宣告失踪的申请主体+变更财产代管人的程序\n\n讲解：\n债权人属于利害关系人，有权申请宣告失踪（A错）。其他利害关系人申请变更代管人→应当以原代管人为被告起诉→适用普通程序（B对）。不是特别程序（C错），不是再审（D错）。\n注意区分：原代管人自己申请变更→特别程序；其他利害关系人申请变更→普通程序诉讼。","flagMemory":false,"level":0,"seen":0}];

/* 两套算法（同一条"强度→间隔"曲线上的两种参数）
   每张卡有本轮"记牢强度" s：
   · 会 → s+1，下次到期间隔 = base × growth^(s-1)，间隔随连续答对指数级拉长（出现变稀）
   · 不会 → s 回落 drop，并以很短的 missGap 很快再来（出现变密）；稳会被压回虚
   · s 达到 grad（间隔已拉得足够长）→ 本轮毕业
   快：目标低、间隔短、答错轻、干净通过只升一级（靠多轮到稳）
   慢：目标高、间隔拉得很长、答错重、一轮干净通过直接到稳 */
const PROFILES={
  fast:{ key:'fast', name:'快速刷题', grad:3, base:3, growth:2, drop:1, missGap:2, cleanToStable:false },
  slow:{ key:'slow', name:'慢速刷题', grad:4, base:5, growth:2, drop:2, missGap:3, cleanToStable:true  },
};
function gapFor(prof, s){ return Math.max(1, Math.round(prof.base * Math.pow(prof.growth, s-1))); }  // 到达强度 s 后，下次隔几张

function byChapter(a,b){ const ca=a.chapter||'', cb=b.chapter||''; if(ca<cb) return -1; if(ca>cb) return 1; return state.cards.indexOf(a)-state.cards.indexOf(b); }

function examInfo(){
  const t=settings.examTime;
  if(!t) return {set:false};
  const ms=t-Date.now();
  return {set:true, t, ms, passed:ms<=0, window: ms>0 && ms<=EXAM_WINDOW_MS};
}

// 根据"学习状态 + 时间"自动判断这次该做什么，不需要手动选
function chooseSession(){
  if(state.cards.length===0) return null;
  const ex=examInfo();
  const unseen=state.cards.filter(c=>c.seen===0).length;
  const weak=state.cards.filter(c=>c.level<2).length;
  const total=state.cards.length;
  if(ex.set && ex.window) return {type:SESS.EXAM};
  if(unseen>0) return {type:SESS.SEED, n:unseen};
  if(weak>0){
    if(Date.now()-(settings.lastFullReview||0) > FULL_GAP_MS) return {type:SESS.REVIEW, n:total};
    return {type:SESS.DRILL, n:weak};
  }
  return {type:SESS.REVIEW, n:total, allStable:true};
}

function sessionHint(s){
  if(!s) return '';
  switch(s.type.key){
    case 'SEED':   return '先过还没看过的 '+s.n+' 题（按章节）';
    case 'REVIEW': return s.allStable ? ('都挺稳了 · 整体检验一遍全部 '+s.n+' 题') : ('整体过一遍全部 '+s.n+' 题');
    case 'DRILL':  return '巩固还没记牢的 '+s.n+' 题';
    case 'EXAM':   return '考前过一遍：先攻重点题，再扫一遍全部题干';
  }
  return '';
}

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function cardById(id){ return state.cards.find(c=>c.id===id); }
const LVL=['生','虚','稳'];

/* ---------- view router ---------- */
let view='home';
let currentPass=null;   // {type, prof, pool:[{id,s,due,mark}], clock, total, revealed, skimAfter, skimDone}
let skim=null;          // {list:[ids], idx}
let editingId=null;

const app=document.getElementById('app');
function activeIdx(p){ let mi=0; for(let i=1;i<p.pool.length;i++){ if(p.pool[i].due < p.pool[mi].due) mi=i; } return mi; }  // 出"最该复习"的那张（到期最早）
function render(){
  if(view==='home') renderHome();
  else if(view==='review') renderReview();
  else if(view==='skim') renderSkim();
  else if(view==='summary') renderSummary();
  else if(view==='manage') renderManage();
}

    cur=d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }

/* ---------- SESSION ENGINE ---------- */
function startSession(profKey){
  const s=chooseSession();
  if(!s){ notify('请先到题库录入题目。'); return; }
  const prof=PROFILES[profKey]||PROFILES.fast;
  const type=s.type, skimAfter=!!type.skimAfter;
  let scope;
  if(type.key==='SEED'){
    scope=state.cards.filter(c=>c.seen===0).slice().sort(byChapter);   // 首次接触：按章节排，看清结构
  } else if(type.key==='DRILL'){
    scope=shuffle(state.cards.filter(c=>c.level<2));
  } else if(type.key==='REVIEW'){
    scope=shuffle(state.cards.slice());
    settings.lastFullReview=Date.now(); saveSettings();
  } else { // EXAM
    scope=shuffle(state.cards.filter(c=>c.flagMemory||c.level<2));
  }

  if(scope.length===0){
    if(skimAfter){ // 考前模式但已无重点题 → 直接快速扫题干
      currentPass={type, prof, pool:[], clock:0, total:0, revealed:false, skimAfter:true, skimDone:true};
      startSkim(); return;
    }
    notify('没有需要复习的卡片 🎉 它们都已经记牢了。'); return;
  }

  // due 用初始顺序铺开（0,1,2…）；之后每次评分推进时钟、按"到期点"重排
  const pool=scope.map((c,idx)=>({ id:c.id, s:0, due:idx, mark:false }));
  currentPass={ type, prof, pool, clock:0, total:scope.length, revealed:false, skimAfter, skimDone:false };
  view='review'; render();
}

/* 二元评分 + 动态到期调度：
   会 → 强度+1，下次间隔随强度指数级拉长（出现变稀）；强度够高就本轮毕业
   不会 → 强度回落、很快再来（出现变密）；稳→虚 */
function grade(g){   // g: 'again' | 'good'
  const p=currentPass, prof=p.prof;
  const i=activeIdx(p), a=p.pool[i], card=cardById(a.id);
  card.seen++;
  if(g==='again'){
    a.mark=true;
    a.s=Math.max(0, a.s-prof.drop);
    if(card.level>1) card.level=1;                 // 一次答错：稳→虚（不一路掉到生）
    a.due=p.clock+prof.missGap;                    // 很快再来
  } else { // good
    a.s+=1;
    if(a.s>=prof.grad){                            // 间隔已拉得足够长 → 本轮毕业
      if(!a.mark) card.level = prof.cleanToStable ? 2 : Math.min(2, card.level+1);  // 干净通过：慢→直接稳，快→升一级
      p.pool.splice(i,1);
    } else {
      a.due=p.clock + gapFor(prof, a.s);           // 答对越多次，间隔越长
    }
  }
  p.clock++;
  p.revealed=false; save();
  if(p.pool.length===0) finishPass(); else render();
}

function finishPass(){
  const p=currentPass;
  if(p.skimAfter && !p.skimDone){ p.skimDone=true; startSkim(); return; }
  view='summary'; render();
}

/* ---------- REVIEW ---------- */
function renderReview(){
  const p=currentPass, prof=p.prof;
  const i=activeIdx(p), a=p.pool[i], card=cardById(a.id);
  const remaining = p.pool.length;
  const graduated = p.total - remaining;
  const pct = p.total ? (graduated/p.total*100) : 0;

  let back='';
  if(p.revealed){
    back='<div class="divider"><span>答案</span></div>'
      +'<div class="answer">'+esc(card.answer||'（未填写答案）')+'</div>'
      +(card.analysis?('<div class="divider"><span>解析</span></div><div class="analysis">'+esc(card.analysis)+'</div>'):'')
      +'<div class="cfoot">'
        +'<span class="seen">第 '+card.seen+' 次见到 · 本轮记牢 '+a.s+'/'+prof.grad+'</span>'
        +'<button class="memtog'+(card.flagMemory?' on':'')+'" id="memTog">'+(card.flagMemory?'★ 记忆类':'☆ 标为记忆类')+'</button>'
      +'</div>';
  }

  let action;
  if(!p.revealed){
    action='<button class="reveal" id="revealBtn">显示答案<span class="k">空格</span></button>';
  } else {
    const goodSub = (a.s+1>=prof.grad) ? '记牢 · 本轮过 ✓' : ('间隔拉长 · 约 '+gapFor(prof, a.s+1)+' 张后');
    const againSub = '很快再来 · 约 '+prof.missGap+' 张后';
    action='<div class="grades grades-2">'
      +'<button class="gbtn again" data-g="again">不会<span class="k">1</span><span class="sub">'+againSub+'</span></button>'
      +'<button class="gbtn good" data-g="good">会<span class="k">2</span><span class="sub">'+goodSub+'</span></button>'
    +'</div><div class="khint">会 → 间隔变长、出现变少；不会 → 很快再来。逐次拉开地答对 '+prof.grad+' 次才算过</div>';
  }

  app.innerHTML=
    '<div class="rev-head"><div class="rh">'
      +'<button class="linkbtn" id="endPass">‹ 结束本轮</button>'
      +'<span class="rev-title">'+esc(p.type.name)+'<span class="rem">剩 '+remaining+'/'+p.total+'</span></span>'
      +'<span style="width:60px"></span>'
    +'</div><div class="prog"><div class="fill" style="width:'+pct+'%"></div></div></div>'
    +'<div class="wrap">'
      +'<div class="card">'
        +'<div class="ctop">'
          +(card.chapter?'<span class="chapchip">'+esc(card.chapter)+'</span>':'')
          +'<span class="badge lvl'+card.level+'">'+LVL[card.level]+'</span>'
          +(card.flagMemory?'<span class="star">★</span>':'')
        +'</div>'
        +'<div class="stem">'+esc(card.question)+'</div>'
        +(card.options?'<div class="opts">'+esc(card.options)+'</div>':'')
        +back
        +action
      +'</div>'
    +'</div>';

  document.getElementById('endPass').onclick=()=>{ currentPass=null; view='home'; render(); };
  const rb=document.getElementById('revealBtn'); if(rb) rb.onclick=()=>{ currentPass.revealed=true; render(); };
  app.querySelectorAll('[data-g]').forEach(b=> b.onclick=()=> grade(b.dataset.g) );
  const mt=document.getElementById('memTog'); if(mt) mt.onclick=()=>{ card.flagMemory=!card.flagMemory; save(); render(); };
}

/* ---------- SKIM (考前快速扫题干) ---------- */
function startSkim(){ skim={ list:shuffle(state.cards.map(c=>c.id)), idx:0 }; view='skim'; render(); }
function renderSkim(){
  const card=cardById(skim.list[skim.idx]);
  const pct=(skim.idx/skim.list.length*100);
  const last=skim.idx>=skim.list.length-1;
  app.innerHTML=
    '<div class="rev-head"><div class="rh">'
      +'<button class="linkbtn" id="endSkim">‹ 结束</button>'
      +'<span class="rev-title">考前扫题<span class="rem">'+(skim.idx+1)+'/'+skim.list.length+'</span></span>'
      +'<span style="width:50px"></span>'
    +'</div><div class="prog"><div class="fill" style="width:'+pct+'%"></div></div></div>'
    +'<div class="wrap">'
      +'<p class="skim-hint">在心里默答一遍，再翻下一张 —— 只为激活，不深读</p>'
      +'<div class="skim-card">'
        +(card.chapter?'<span class="chapchip">'+esc(card.chapter)+'</span>':'')
        +(card.flagMemory?' <span class="star">★</span>':'')
        +'<div class="stem" style="margin-top:12px">'+esc(card.question)+'</div>'
        +(card.options?'<div class="opts">'+esc(card.options)+'</div>':'')
      +'</div>'
      +'<button class="nextbtn" id="skimNext">'+(last?'完成':'下一题')+' <span style="font-family:var(--font-mono);font-size:12px;opacity:.7">空格</span></button>'
    +'</div>';
  document.getElementById('endSkim').onclick=()=> finishSkim();
  document.getElementById('skimNext').onclick=()=>{ if(last) finishSkim(); else { skim.idx++; render(); } };
}
function finishSkim(){ skim=null; view='summary'; render(); }

/* ---------- editor modal ---------- */
function modalShell(inner){
  const m=document.createElement('div'); m.className='modal';
  m.innerHTML='<div class="sheet">'+inner+'</div>';
  m.addEventListener('mousedown',e=>{ if(e.target===m) m.remove(); });
  document.body.appendChild(m); return m;
}
// 应用内提示/确认（替代被部分环境屏蔽的原生 alert/confirm）
function notify(msg){
  const m=modalShell('<div class="notice">'+esc(msg)+'</div><div class="sheet-foot"><button class="add" id="nt_ok">知道了</button></div>');
  m.querySelector('#nt_ok').onclick=()=>m.remove();
}
function confirmModal(msg, onYes, opts){
  opts=opts||{};
  const m=modalShell('<div class="notice">'+esc(msg)+'</div><div class="sheet-foot">'
    +'<button class="ghost" id="cf_no">取消</button>'
    +'<button class="'+(opts.danger?'danger-btn':'add')+'" id="cf_yes">'+esc(opts.confirmText||'确定')+'</button></div>');
  m.querySelector('#cf_no').onclick=()=>m.remove();
  m.querySelector('#cf_yes').onclick=()=>{ m.remove(); if(onYes) onYes(); };
}
function openEditor(id){
  const c = id? cardById(id) : null;
  const m=modalShell(
    '<h3>'+(c?'编辑题目':'新增题目')+'</h3>'
    +'<div class="field"><label>章节（可选）</label><input type="text" id="f_chapter" value="'+esc(c?c.chapter:'')+'" placeholder="如：管辖 / 证据"></div>'
    +'<div class="field"><label>题干</label><textarea id="f_question" rows="3" placeholder="题目正文">'+esc(c?c.question:'')+'</textarea></div>'
    +'<div class="field"><label>选项（可选）</label><textarea id="f_options" rows="4" placeholder="A. ……&#10;B. ……&#10;C. ……&#10;D. ……">'+esc(c?c.options:'')+'</textarea></div>'
    +'<div class="field"><label>答案</label><textarea id="f_answer" rows="2" placeholder="如：答案 B">'+esc(c?c.answer:'')+'</textarea></div>'
    +'<div class="field"><label>解析</label><textarea id="f_analysis" rows="4" placeholder="解析 / 考点">'+esc(c?c.analysis:'')+'</textarea></div>'
    +'<div class="field"><label class="cbline"><input type="checkbox" id="f_mem"'+(c&&c.flagMemory?' checked':'')+'> 记忆类（期限 / 天数等，考前重点过）</label></div>'
    +'<div class="sheet-foot"><button class="ghost" id="f_cancel">取消</button><button class="add" id="f_save">保存</button></div>'
  );
  m.querySelector('#f_cancel').onclick=()=> m.remove();
  m.querySelector('#f_save').onclick=()=>{
    const data={ chapter:m.querySelector('#f_chapter').value.trim(), question:m.querySelector('#f_question').value.trim(),
      options:m.querySelector('#f_options').value.trim(), answer:m.querySelector('#f_answer').value.trim(),
      analysis:m.querySelector('#f_analysis').value.trim(), flagMemory:m.querySelector('#f_mem').checked };
    if(!data.question){ notify('题干不能为空。'); return; }
    if(c){ Object.assign(c,data); } else { state.cards.push(makeCard(data)); }
    save(); m.remove(); render();
  };
}

/* ---------- bulk import ---------- */
function openBulk(){
  const help='每题之间用一行 --- 分隔。字段可多行：\n'
    +'章: 章节（可选）\n题: 题干\n选: 选项（可选）\n答: 答案\n解: 解析\n记: 记忆类填 1（可选）';
  const example='章: 管辖\n题: 这是题干……\n选: A. ……\nB. ……\nC. ……\nD. ……\n答: 答案 C\n解: 解析……\n记: 0\n---\n题: 第二题题干……\n答: 答案 A\n解: 解析……';
  const m=modalShell(
    '<h3>批量导入</h3>'
    +'<div class="help">'+esc(help)+'</div>'
    +'<div class="field"><label>粘贴题目</label><textarea id="bulk_in" rows="12" placeholder="'+esc(example)+'"></textarea></div>'
    +'<div class="sheet-foot"><button class="ghost" id="bulk_cancel">取消</button><button class="add" id="bulk_go">导入</button></div>'
  );
  m.querySelector('#bulk_cancel').onclick=()=> m.remove();
  m.querySelector('#bulk_go').onclick=()=>{
    const cards=parseBulk(m.querySelector('#bulk_in').value);
    if(cards.length===0){ notify('没有解析出题目，检查一下格式（每题用 --- 分隔，至少要有"题:"）。'); return; }
    state.cards=state.cards.concat(cards); save(); m.remove(); render();
    notify('已追加 '+cards.length+' 道题。');
  };
}
function parseBulk(text){
  const map={'章':'C','题':'Q','选':'O','答':'A','解':'E','记':'M','C':'C','Q':'Q','O':'O','A':'A','E':'E','M':'M'};
  const blocks=text.split(/^\s*-{3,}\s*$/m);
  const out=[];
  for(const b of blocks){
    const f={C:'',Q:'',O:'',A:'',E:'',M:''}; let cur=null;
    for(const line of b.split(/\r?\n/)){
      const mt=line.match(/^\s*(章|题|选|答|解|记|[CQOAEM])\s*[:：]\s?(.*)$/);
      if(mt){ cur=map[mt[1]]; f[cur]=(f[cur]?f[cur]+'\n':'')+mt[2]; }
      else if(cur!==null){ f[cur]+='\n'+line; }
    }
    for(const k in f) f[k]=f[k].replace(/\n+$/,'').trim();
    if(f.Q) out.push(makeCard({ chapter:f.C, question:f.Q, options:f.O, answer:f.A, analysis:f.E, flagMemory:/^(1|y|yes|是|true|✓)/i.test(f.M) }));
  }
  return out;
}

/* ---------- export / import json ---------- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(state.cards,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  const d=new Date(), pad=n=>String(n).padStart(2,'0');
  a.href=url; a.download='minsu-cards-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function openImport(){
  const m=modalShell(
    '<h3>导入备份</h3>'
    +'<div class="help">'+esc('选择之前导出的 .json 文件，或把内容粘贴到下面。导入会覆盖当前题库（含进度）。')+'</div>'
    +'<div class="field"><label>选择文件</label><input type="file" id="imp_file" accept="application/json,.json"></div>'
    +'<div class="field"><label>或粘贴 JSON</label><textarea id="imp_text" rows="8" placeholder="[ ... ]"></textarea></div>'
    +'<div class="sheet-foot"><button class="ghost" id="imp_cancel">取消</button><button class="add" id="imp_go">导入（覆盖）</button></div>'
  );
  m.querySelector('#imp_cancel').onclick=()=> m.remove();
  m.querySelector('#imp_file').onchange=e=>{ const file=e.target.files[0]; if(!file) return; const r=new FileReader(); r.onload=()=>{ m.querySelector('#imp_text').value=r.result; }; r.readAsText(file); };
  m.querySelector('#imp_go').onclick=()=>{
    const raw=m.querySelector('#imp_text').value.trim(); if(!raw){ notify('没有内容可导入。'); return; }
    let arr; try{ arr=JSON.parse(raw); }catch(err){ notify('JSON 解析失败：'+err.message); return; }
    if(!Array.isArray(arr)){ notify('格式应是一个数组（[ ... ]）。'); return; }
    confirmModal('导入 '+arr.length+' 道题，覆盖当前题库（含进度）？', ()=>{
      state.cards=arr.map(o=>makeCard(o)); save(); m.remove(); render();
      notify('已导入 '+arr.length+' 道题。');
    }, {confirmText:'覆盖导入', danger:true});
  };
}

/* ---------- keyboard ---------- */
document.addEventListener('keydown',e=>{
  if(document.querySelector('.modal')) return;
  const tag=(e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='textarea') return;
  if(view==='review'){
    const p=currentPass; if(!p) return;
    if(!p.revealed){ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); p.revealed=true; render(); } }
    else { if(e.key==='1'){ e.preventDefault(); grade('again'); } else if(e.key==='2'){ e.preventDefault(); grade('good'); } }
  } else if(view==='skim'){
    if(e.key===' '||e.key==='Enter'||e.key==='ArrowRight'){ e.preventDefault();
      if(skim.idx>=skim.list.length-1) finishSkim(); else { skim.idx++; render(); } }
  }
});

/* ---------- go ---------- */
render();
</script>
